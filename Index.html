<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Desafios Ultra Pro v4.5 - Edição Sazonal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-principal: #121420;
            --bg-painel: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --texto: #f0f2f5;
            --primaria: #00f2fe;
            --secundaria: #4facfe;
            --botao-girar: #ff2a5f;
            
            /* Cores padrão da Roleta */
            --roleta-fundo-1: #1a1d2d;
            --roleta-fundo-2: #24293e;
            --roleta-texto: #ffffff;
            --roleta-borda: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f9;
            --bg-painel: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --texto: #1a1d24;
            --primaria: #0072ff;
            --secundaria: #00c6ff;
            --roleta-fundo-1: #ffffff;
            --roleta-fundo-2: #e4e8f0;
            --roleta-texto: #1a1d24;
            --roleta-borda: rgba(0, 0, 0, 0.1);
        }

        /* Temas aplicados à Roleta e Elementos de Destaque */
        [data-roleta-theme="verde-neon"] {
            --roleta-fundo-1: #0d2419; --roleta-fundo-2: #143525; --roleta-texto: #39ff14; --roleta-borda: #39ff14;
        }
        [data-roleta-theme="azul-nv8"] {
            --roleta-fundo-1: #0a2145; --roleta-fundo-2: #103166; --roleta-texto: #0095ff; --roleta-borda: #0095ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-principal); color: var(--texto); min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.2); position: relative; z-index: 10; }
        .header-controles { display: flex; gap: 12px; align-items: center; }
        
        .btn-header { background: var(--bg-painel); border: 1px solid var(--border-color); color: var(--texto); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .btn-header:hover { border-color: var(--primaria); }

        /* Estilo do Titulo em Degradê */
        .titulo-roleta-container { width: 100%; text-align: center; padding-top: 20px; position: relative; z-index: 10; }
        .titulo-roleta { font-size: 42px; font-weight: bold; font-family: 'Georgia', serif; background: linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .subtitulo-sazonal { font-size: 20px; font-weight: bold; font-family: 'Segoe UI', sans-serif; margin-top: 4px; }

        /* Animações de Movimento de Degradê */
        .titulo-lgbt-movimento {
            font-size: 42px; font-weight: bold; font-family: 'Georgia', serif;
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #004CFF, #732982);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradienteMovimento 8s ease infinite;
        }
        .titulo-brasil-movimento {
            font-size: 42px; font-weight: bold; font-family: 'Georgia', serif;
            background: linear-gradient(90deg, #0c7016, #ffff00, #233dff, #0c7016);
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradienteMovimento 5s linear infinite;
        }
        @keyframes gradienteMovimento {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Elementos Visuais Específicos de Fundo (Setembro) */
        .bandeira-central-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22vw; opacity: 0.18; pointer-events: none; z-index: 0; display: none; }
        
        .dashboard { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 25px; max-width: 1100px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
        .area-roleta { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .cronometro-caixa-interna { font-size: 42px; font-weight: 800; color: var(--primaria); font-family: monospace; letter-spacing: 1px; text-align: center; margin: 5px 0; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 5px; border: 1px solid var(--border-color); }

        .painel-controle-partida { background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .controle-linha { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
        .controle-linha input[type="number"], .controle-linha select { padding: 5px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--texto); border-radius: 6px; }

        .roleta-wrapper { position: relative; width: 100%; max-width: 380px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        .marcador-topo { position: absolute; top: -10px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--botao-girar); z-index: 10; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 4px solid var(--roleta-borda); transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .btn-centro-girar { position: absolute; width: 75px; height: 75px; background: var(--botao-girar); border: 4px solid #fff; border-radius: 50%; color: white; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 12; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .painel-validacao { width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 12px; text-align: center; background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .btn-validar { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-validar.sucesso { background: #2ecc71; color: white; }
        .btn-validar.falha { background: #ff2a5f; color: white; }

        .secao-configuracoes { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .secao-configuracoes { grid-template-columns: 1fr; } }

        .card { background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card-titulo { font-size: 15px; font-weight: 600; color: var(--primaria); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        
        .perfil-mini-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; }
        .xp-barra-fundo { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .xp-barra-progresso { background: linear-gradient(90deg, var(--primaria), var(--secundaria)); height: 100%; width: 0%; }

        .lista-jogadores { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .jogador-item { display: flex; align-items: center; gap: 12px; background: rgba(0, 0, 0, 0.2); padding: 8px 12px; border-radius: 10px; border: 1px solid transparent; }
        .jogador-item.ativo { border-color: var(--primaria); background: rgba(0, 242, 254, 0.1); }

        .botoes-dificuldade { display: flex; gap: 8px; width: 100%; }
        .btn-dif { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--texto); cursor: pointer; font-size: 11px; opacity: 0.4; }
        .btn-dif.ativo { border-color: var(--primaria); background: rgba(0, 242, 254, 0.25); opacity: 1; font-weight: bold; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.82); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-card { background: #1a1d24; border: 1px solid var(--border-color); width: 100%; max-width: 450px; padding: 25px; color: #f0f2f5; position: relative; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-fechar { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; }

        /* Estilos do Botão Sazonal Flutuante Lateral */
        .btn-sazonal-flutuante { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); width: 62px; height: 62px; border-radius: 50%; border: 3px solid var(--border-color); font-size: 30px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 90; box-shadow: 0 6px 20px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .btn-sazonal-flutuante:hover { transform: translateY(-50%) scale(1.12); }

        .menu-junho-container { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: none; flex-direction: column; gap: 10px; z-index: 90; }
        .btn-junho-opcao { width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Animações de Emojis do Ambiente */
        .emoji-sazonal-bg { position: fixed; top: -50px; font-size: 25px; pointer-events: none; opacity: 0.75; z-index: 1; }
        @keyframes quedaDiagonal {
            0% { transform: translate(0, 0) rotate(0deg); top: -50px; }
            100% { transform: translate(-320px, 105vh) rotate(360deg); }
        }
        @keyframes explosaoCirculo {
            0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); opacity: 0; }
            50% { opacity: 0.85; }
            100% { transform: translate(var(--x-final), var(--y-final)) scale(1) rotate(360deg); opacity: 0; }
        }

        /* Canvas específico para efeito de confetes */
        #canvasConfetes { position: fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:95; display:none; }

        .seletor-teste-container { background: rgba(255, 170, 0, 0.1); border: 1px dashed #ffaa00; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: none; flex-direction: column; gap: 8px; font-size: 12px; width: 100%; }
    </style>
</head>
<body>

    <div id="containerEmojisSazonais"></div>
    <div class="bandeira-central-bg" id="bandeiraBrasilBg">🇧🇷</div>
    <canvas id="canvasConfetes"></canvas>

    <button id="btnSazonalFlutuante" class="btn-sazonal-flutuante" onclick="ativarCliqueSazonal()"></button>

    <div class="menu-junho-container" id="menuJunhoCont">
        <button class="btn-junho-opcao" style="background: linear-gradient(45deg, #ff004c, #7900ff);" onclick="forcarSubEventoJunho('jun_orgulho')">🌈</button>
        <button class="btn-junho-opcao" style="background: #ffc2c7;" onclick="forcarSubEventoJunho('jun_namorados')">🏹</button>
        <button class="btn-junho-opcao" style="background: #de0f3f;" onclick="forcarSubEventoJunho('jun_saojoao')">🔥</button>
    </div>

    <header>
        <div class="header-controles">
            <button class="btn-header" onclick="alternarModo()">🌓 Modo Base</button>
        </div>
        <div class="header-controles">
            <button class="btn-header" id="btnAuthHeader" onclick="abrirModalAuth()">👤 Login / Cadastro</button>
            <button class="btn-header btn-logout" id="btnLogoutHeader" style="display: none;" onclick="executarLogout()">供 Sair</button>
        </div>
    </header>

    <div class="titulo-roleta-container">
        <h1 class="titulo-roleta" id="txtTituloRoleta">ℛℴ𝓁ℯ𝓉𝒶</h1>
        <div class="subtitulo-sazonal" id="txtSubtituloSazonal"></div>
    </div>

    <main class="dashboard">
        <section class="area-roleta">

            <div class="seletor-teste-container" id="painelTesteAdmin">
                <span style="color:#ffaa00; font-weight:bold;">🛠️ Painel do Avaliador (ID: #1122264)</span>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <label>Forçar Evento: 
                        <select id="selectForcarEvento" onchange="forcarEventoManual(this.value)">
                            <option value="">-- Data Atual do Sistema --</option>
                            <option value="set_independencia">Setembro (1-30) - Independência 🇧🇷</option>
                            <option value="out_criancas">Outubro (1-15) - Dia das Crianças 🍭</option>
                            <option value="out_halloween">Outubro (16-31) - Halloween 🎃</option>
                            <option value="nov_normal">Novembro (1-30) - Padrão Normal 🍂</option>
                            <option value="dez_natal">Dezembro (1-31) - Feliz Natal 🎄</option>
                            <option value="jan_1_15">Jan (1-15) - Ano Novo</option>
                            <option value="jun_orgulho">Junho - Orgulho LGBT 🌈</option>
                        </select>
                    </label>
                    <button class="btn-header" style="border-color:#ff4a4a;" onclick="forcarEventoManual('DESATIVAR')">❌ Desativar Evento</button>
                </div>
            </div>

            <div class="painel-controle-partida">
                <div class="controle-linha">
                    <span style="font-weight: bold; color: var(--primaria);" id="lblPainelControle">⚙️ Painel de Controle de Partida</span>
                </div>
                
                <div class="cronometro-caixa-interna" id="cronometro">00:30</div>

                <div class="controle-linha">
                    <label id="lblTempoS">Tempo (s): <input type="number" id="tempoInput" value="30" min="5" max="300" onchange="atualizarDisplayTempo()"></label>
                    <label id="lblTempAtivo"><input type="checkbox" id="ativarTempo" checked onchange="toggleTemporizadorVisivel()"> Temporizador Ativo</label>
                </div>
                <div class="controle-linha">
                    <label id="lblModoTempo">Modo Tempo: 
                        <select id="modoTempoSelect">
                            <option value="automatico">Automático</option>
                            <option value="manual">Manual</option>
                        </select>
                    </label>
                    <label id="lblMutarSom"><input type="checkbox" id="mutarSomCheck"> Desativar Som</label>
                </div>
                <div class="controle-linha">
                    <label id="lblGiroAuto"><input type="checkbox" id="autoGirarCheck"> Giro Contínuo</label>
                    <label id="lblQtdGiros">Qtd Giros: <input type="number" id="girosInput" value="5" min="1"></label>
                </div>
                <div class="controle-linha">
                    <div class="botoes-dificuldade" id="boxFiltrosRapidos">
                        <button class="btn-dif ativo" id="filtro-facil" onclick="mudarFiltro('Fácil')">🟢 Fácil</button>
                        <button class="btn-dif ativo" id="filtro-medio" onclick="mudarFiltro('Médio')">🟡 Médio</button>
                        <button class="btn-dif ativo" id="filtro-dificil" onclick="mudarFiltro('Difícil')">🔴 Difícil</button>
                    </div>
                </div>
            </div>

            <div class="roleta-wrapper">
                <div class="marcador-topo"></div>
                <canvas id="roletaCanvas" width="500" height="500"></canvas>
                <button class="btn-centro-girar" onclick="girarRoleta()">Girar</button>
            </div>

            <div class="painel-validacao" id="painelValidacao">
                <div id="desafioAtualTexto" style="font-weight: bold; margin-bottom: 10px;"></div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-validar sucesso" onclick="validarResultado(true)">Cumpriu 👍</button>
                    <button class="btn-validar falha" onclick="validarResultado(false)">Não Cumpriu 👎</button>
                </div>
            </div>

            <div class="card" style="width:100%; max-width:500px;"><div class="historico-caixa" id="historico" style="font-size:12px; opacity:0.8;">Painel de jogo carregado.</div></div>
        </section>

        <section class="secao-configuracoes">
            <div class="card">
                <div class="card-titulo" id="lblJogadoresSala">👥 Jogadores da Sala</div>
                
                <div id="perfilLogadoBox" class="perfil-mini-box" style="display: none;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div id="perfAvatar" style="width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; border:2px solid var(--primaria);">👑</div>
                        <div>
                            <span id="perfNome" style="font-weight:bold; display:block;">Dono</span>
                            <span id="perfID" style="font-size:11px; opacity:0.6; font-family:monospace;">#0000000</span>
                            <span id="perfNivel" style="background:var(--primaria); color:#121420; font-size:10px; font-weight:bold; padding:1px 5px; border-radius:4px;">Nível 1</span>
                        </div>
                    </div>
                    <div style="margin-top:8px;">
                        <div style="display:flex; justify-content:space-between; font-size:11px;"><span id="perfXpTexto">XP: 0/50</span><span id="perfXpLimite">0/25 Diário</span></div>
                        <div class="xp-barra-fundo"><div class="xp-barra-progresso" id="perfBarraProgresso"></div></div>
                    </div>
                </div>

                <div style="display:flex; gap:6px;">
                    <input type="text" id="nome-jogador" placeholder="Convidado Local...">
                    <button class="btn-header" style="background:var(--primaria); color:#000;" onclick="adicionarJogador()">+ Add</button>
                </div>
                <div class="lista-jogadores" id="listaJogadoresContainer"></div>
            </div>

            <div class="card">
                <div class="card-titulo" id="lblGestaoMissoes">🎯 Adicionar Missões Simples</div>
                <div style="display:flex; gap:6px; flex-direction:column;">
                    <input type="text" id="texto-desafio" placeholder="Nova Missão...">
                    <select id="dificuldade-desafio"><option value="Fácil">Fácil (5pts)</option><option value="Médio">Médio (10pts)</option><option value="Difícil">Difícil (20pts)</option></select>
                    <button class="btn-header" style="background:var(--primaria); color:#000; justify-content:center;" onclick="adicionarDesafio()">Adicionar à Lista</button>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalSazonalPopup">
        <div class="modal-card" style="text-align: center; max-width: 460px; padding: 30px;">
            <button class="modal-fechar" onclick="fecharSazonalPopup()">✕</button>
            <div style="font-size: 45px; margin-bottom: 15px;" id="popupSazonalEmoji">✨</div>
            <p style="font-size: 16px; font-style: italic; line-height: 1.6; white-space:pre-line;" id="popupSazonalTexto"></p>
        </div>
    </div>

    <div class="modal-overlay" id="modalAuth">
        <div class="modal-card">
            <button class="modal-fechar" onclick="fecharModalAuth()">✕</button>
            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <button class="btn-header" onclick="document.getElementById('formLogin').style.display='flex'; document.getElementById('formCadastro').style.display='none';">Login</button>
                <button class="btn-header" onclick="document.getElementById('formLogin').style.display='none'; document.getElementById('formCadastro').style.display='flex';">Cadastro</button>
            </div>
            <form id="formLogin" style="display:flex; flex-direction:column; gap:10px;" onsubmit="executarLogin(event)">
                <input type="text" id="loginUser" placeholder="Usuário ou E-mail" required>
                <input type="password" id="loginSenha" placeholder="Senha" required>
                <button type="submit" class="btn-header" style="background:var(--primaria); color:#000; justify-content:center;">Entrar</button>
            </form>
            <form id="formCadastro" style="display:none; flex-direction:column; gap:10px;" onsubmit="executarCadastro(event)">
                <input type="text" id="cadNome" placeholder="Nome Completo" required>
                <input type="text" id="cadUser" placeholder="Username" required>
                <input type="email" id="cadEmail" placeholder="E-mail" required>
                <input type="password" id="cadSenha" placeholder="Senha (max 8 car.)" maxlength="8" required>
                <button type="submit" class="btn-header" style="background:var(--primaria); color:#000; justify-content:center;">Criar Conta</button>
            </form>
        </div>
    </div>

    <script>
        let jogadoresLocais = [];
        let jugadorAtualIndex = 0;
        let estaGirando = false;
        let anguloAtual = 0;
        let usuarioLogado = null;
        let cronometroInterval = null;
        let desafioSorteadoGlobal = null;
        let eventoForcadoChave = "";
        let idIntervalAnimacaoSazonal = null;
        let subEventoJunhoForcado = "";

        let desafios = [
            { texto: "Equilibrar num pé só", dif: "Fácil" },
            { texto: "Ficar estátua por 20s", dif: "Fácil" },
            { texto: "Imitar um macaco", dif: "Médio" },
            { texto: "Pagar 10 flexões", dif: "Difícil" }
        ];
        let filtrosAtivos = { "Fácil": true, "Médio": true, "Difícil": true };

        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');

        // Configuração Geral dos Eventos Modulares
        const configuracoesSazonais = {
            set_independencia: {
                subtitulo: "Semana da Pátria 🇧🇷", animarTituloBrasil: true, displayBandeira: true, tipoAnimacao: "circulo",
                fatia: "#0c7016", borda: "#ffff00", letras: "#FFFFFF", bg: "#233dff", emojis: ["💚", "💛", "💙"], botaoEmoji: "🇧🇷",
                acaoBotao: () => abrirPopupSazonal("🇧🇷", "INDEPENDÊNCIA OU MORTE?")
            },
            out_criancas: {
                subtitulo: "Mês das Crianças 🧸", tonsPasteis: true, tipoAnimacao: "diagonal", som: true, confetes: true,
                fatia: "#ffb3ba", borda: "#baffc9", letras: "#555555", bg: "#f0f4f8", emojis: ["🧸","🪅","💭","🪇","🏎️"], botaoEmoji: "🍭",
                acaoBotao: () => { executarExplosaoConfetes(); abrirPopupSazonal("🍭", "Feliz Dia das Crianças! Divirta-se e jogue bastante!"); }
            },
            out_halloween: {
                subtitulo: "Doces ou Travessuras? 🎃", tipoAnimacao: "diagonal",
                fatia: "#3e1964", borda: "#fc4c00", letras: "#FFFFFF", bg: "#000000", emojis: ["🎃", "💀"], botaoEmoji: "🦇",
                acaoBotao: () => abrirPopupSazonal("🎃", "Cuidado com os sustos na roleta!")
            },
            nov_normal: { estaticoNormal: true },
            dez_natal: {
                subtitulo: "Feliz Natal 🎄", textoNatalSub: true, tipoAnimacao: "diagonal",
                fatia: "#e90808", borda: "#d9d9d9", letras: "#FFFFFF", bg: "#00bf63", emojis: ["🦌", "🛷", "🎁"], botaoEmoji: "🎄",
                acaoBotao: () => abrirPopupSazonal("✝️", `"E o Verbo se fez carne e habitou entre nós, cheio de graça e de verdade, e vimos a sua glória, glória como do unigênito do Pai."\n\nJoão 1.14 ✝️🛐`)
            },
            jan_1_15: { subtitulo: "Feliz Ano Novo", fatia: "#fad430", borda: "#e18b22", letras: "#953f10", bg: "#FFFFFF", emojis: ["🍾"], botaoEmoji: "✨" },
            jun_orgulho: { subtitulo: "Orgulho LGBT 🌈", fatia: "multi", borda: "#ffffff", letras: "#ffffff", bg: "#1a0221", emojis: ["🌈"], botaoEmoji: "🌈" }
        };

        window.addEventListener('load', () => {
            let logadoSalvo = localStorage.getItem('roleta_logado');
            if(logadoSalvo) { usuarioLogado = JSON.parse(logadoSalvo); }
            atualizarInterfaceLogado();
            verificarEExecutarEventosSazonais();
            atualizarJogadores();
            atualizarDisplayTempo();
        });

        function verificarEExecutarEventosSazonais() {
            clearInterval(idIntervalAnimacaoSazonal);
            document.getElementById('containerEmojisSazonais').innerHTML = "";
            document.getElementById('bandeiraBrasilBg').style.display = "none";
            document.getElementById('canvasConfetes').style.display = "none";
            
            let chaveEvento = "";

            if (eventoForcadoChave !== "") {
                if(eventoForcadoChave === "DESATIVAR") chaveEvento = "";
                else chaveEvento = eventoForcadoChave;
            } else {
                let agora = new Date();
                let mes = agora.getMonth() + 1;
                let dia = agora.getDate();

                if (mes === 9) chaveEvento = "set_independencia";
                else if (mes === 10 && dia <= 15) chaveEvento = "out_criancas";
                else if (mes === 10 && dia >= 16) chaveEvento = "out_halloween";
                else if (mes === 11) chaveEvento = "nov_normal";
                else if (mes === 12) chaveEvento = "dez_natal";
            }

            const btnFlutuante = document.getElementById('btnSazonalFlutuante');
            const menuJunho = document.getElementById('menuJunhoCont');
            const txtSub = document.getElementById('txtSubtituloSazonal');
            const txtTitulo = document.getElementById('txtTituloRoleta');

            // Reset de classes e estilos para o Modo Base
            txtTitulo.className = "titulo-roleta";
            txtTitulo.innerHTML = "ℛℴ𝓁ℯ𝓉𝒶";
            txtTitulo.style.background = ""; txtTitulo.style.webkitBackgroundClip = ""; txtTitulo.style.webkitTextFillColor = "";
            txtSub.innerText = "";
            document.body.style.background = ""; document.body.style.color = "";
            btnFlutuante.style.display = "none"; menuJunho.style.display = "none";
            
            ajustarCoresInterfaceTexto(""); 

            if (chaveEvento !== "" && configuracoesSazonais[chaveEvento] && !configuracoesSazonais[chaveEvento].estaticoNormal) {
                let conf = configuracoesSazonais[chaveEvento];

                // Força visual estático do evento impedindo quebras pelo Modo Base
                document.body.style.background = conf.bg;
                document.body.style.color = (conf.bg === "#FFFFFF" || conf.tonsPasteis) ? "#1a1d24" : "#f0f2f5";
                ajustarCoresInterfaceTexto(document.body.style.color);

                if(conf.subtitulo) txtSub.innerText = conf.subtitulo;

                if(conf.textoNatalSub) {
                    txtTitulo.innerHTML = 'Roleta<br><span style="font-size:24px; color:#FFFFFF; font-family:sans-serif;">Feliz Natal</span>';
                }

                if (conf.animarTituloBrasil) {
                    txtTitulo.className = "titulo-brasil-movimento";
                }

                if (conf.displayBandeira) {
                    document.getElementById('bandeiraBrasilBg').style.display = "block";
                }

                btnFlutuante.innerText = conf.botaoEmoji;
                btnFlutuante.style.background = conf.fatia === "multi" ? "#7900ff" : conf.fatia;
                btnFlutuante.style.color = conf.letras;
                btnFlutuante.style.borderColor = conf.borda;
                btnFlutuante.style.display = "flex";

                inicializarAnimacaoAmbiente(conf.emojis, conf.tipoAnimacao);
                window.sazonalAtivoDados = conf;
            } else {
                window.sazonalAtivoDados = null;
                txtTitulo.style.background = "linear-gradient(135deg, #a855f7, #6366f1)";
                txtTitulo.style.webkitBackgroundClip = "text";
                txtTitulo.style.webkitTextFillColor = "transparent";
            }
            desenharRoleta();
        }

        function inicializarAnimacaoAmbiente(listaEmojis, tipo) {
            const container = document.getElementById('containerEmojisSazonais');
            idIntervalAnimacaoSazonal = setInterval(() => {
                if(document.hidden) return;
                let emojiEl = document.createElement('div');
                emojiEl.className = 'emoji-sazonal-bg';
                emojiEl.innerText = listaEmojis[Math.floor(Math.random() * listaEmojis.length)];
                
                if (tipo === "circulo") {
                    emojiEl.style.left = "50vw";
                    emojiEl.style.top = "50vh";
                    let angulo = Math.random() * Math.PI * 2;
                    let raio = Math.random() * 40 + 35; 
                    let xFinal = Math.cos(angulo) * raio + "vw";
                    let yFinal = Math.sin(angulo) * raio + "vh";
                    emojiEl.style.setProperty('--x-final', xFinal);
                    emojiEl.style.setProperty('--y-final', yFinal);
                    emojiEl.style.animation = "explosaoCirculo 5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards";
                } else {
                    emojiEl.style.left = (Math.random() * 90 + 5) + "vw";
                    emojiEl.style.animation = "quedaDiagonal 6s linear forwards";
                }
                
                container.appendChild(emojiEl);
                setTimeout(() => { emojiEl.remove(); }, 6000);
            }, 35000); // 400ms para manter fluxo ideal e fluído
        }

        function ativarCliqueSazonal() {
            if(window.sazonalAtivoDados && window.sazonalAtivoDados.acaoBotao) {
                if(window.sazonalAtivoDados.som) {
                    try {
                        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        let oscillator = audioCtx.createOscillator();
                        oscillator.type = 'triangle'; oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                        oscillator.connect(audioCtx.destination); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15);
                    } catch(e){}
                }
                window.sazonalAtivoDados.acaoBotao();
            }
        }

        function abrirPopupSazonal(emoji, texto) {
            document.getElementById('popupSazonalEmoji').innerText = emoji;
            document.getElementById('popupSazonalTexto').innerText = texto;
            document.getElementById('modalSazonalPopup').style.display = 'flex';
        }
        function fecharSazonalPopup() { document.getElementById('modalSazonalPopup').style.display = 'none'; }

        function forcarEventoManual(valorChave) {
            eventoForcadoChave = valorChave;
            verificarEExecutarEventosSazonais();
        }

        function ajustarCoresInterfaceTexto(cor) {
            const idsCores = ['lblPainelControle', 'lblTempoS', 'lblTempAtivo', 'lblModoTempo', 'lblMutarSom', 'lblGiroAuto', 'lblQtdGiros', 'lblJogadoresSala', 'lblGestaoMissoes'];
            idsCores.forEach(id => {
                let el = document.getElementById(id);
                if(el) el.style.color = cor;
            });
        }

        function alternarModo() {
            // Trava para impedir alteração visual se houver evento ativo
            if(window.sazonalAtivoDados) return; 
            let m = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', m === 'light' ? 'default' : 'light');
            desenharRoleta();
        }

        function executarExplosaoConfetes() {
            const cConf = document.getElementById('canvasConfetes');
            cConf.style.display = "block";
            const cCtx = cConf.getContext('2d');
            cConf.width = window.innerWidth; cConf.height = window.innerHeight;
            let part = [];
            for(let i=0; i<80; i++) {
                part.push({ x: cConf.width/2, y: cConf.height/2, dx: (Math.random()-0.5)*12, dy: (Math.random()-0.7)*15, cor: `hsl(${Math.random()*360}, 100%, 70%)`, r: Math.random()*5+4 });
            }
            let j = 0;
            function anim() {
                cCtx.clearRect(0,0,cConf.width,cConf.height);
                part.forEach(p => {
                    p.x += p.dx; p.y += p.dy; p.dy += 0.2;
                    cCtx.fillStyle = p.cor; cCtx.beginPath(); cCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); cCtx.fill();
                });
                if(j++ < 100) requestAnimationFrame(anim);
                else cConf.style.display = "none";
            }
            anim();
        }

        function atualizarInterfaceLogado() {
            let pBox = document.getElementById('perfilLogadoBox');
            let btnAuth = document.getElementById('btnAuthHeader');
            let btnOut = document.getElementById('btnLogoutHeader');
            let pAdmin = document.getElementById('painelTesteAdmin');

            if(usuarioLogado) {
                pBox.style.display = 'block'; btnAuth.style.display = 'none'; btnOut.style.display = 'block';
                document.getElementById('perfAvatar').innerText = usuarioLogado.emoji || "👑";
                document.getElementById('perfNome').innerText = usuarioLogado.nome;
                document.getElementById('perfID').innerText = usuarioLogado.id;
                document.getElementById('perfNivel').innerText = `Nível ${usuarioLogado.nivel || 1}`;
                let max = 50 + ((usuarioLogado.nivel || 1) - 1) * 25;
                document.getElementById('perfXpTexto').innerText = `XP: ${usuarioLogado.xp || 0}/${max}`;
                document.getElementById('perfBarraProgresso').style.width = `${((usuarioLogado.xp || 0) / max) * 100}%`;
                
                // Validação Real do ID de Desenvolvedor para exibir painel
                if (usuarioLogado.id === "#1122264") {
                    pAdmin.style.display = "flex";
                } else {
                    pAdmin.style.display = "none";
                }
            } else {
                pBox.style.display = 'none'; btnAuth.style.display = 'block'; btnOut.style.display = 'none'; pAdmin.style.display = "none";
            }
        }

        function executarCadastro(e) {
            e.preventDefault();
            let user = document.getElementById('cadUser').value.trim().toLowerCase();
            let novoUser = {
                id: user === "admin" ? "#1122264" : "#" + Math.floor(1000000 + Math.random() * 9000000).toString(),
                nome: document.getElementById('cadNome').value.trim(), user, email: document.getElementById('cadEmail').value.trim(),
                emoji: "⭐", nivel: 1, xp: 0, pontos: 0
            };
            usuarioLogado = novoUser; localStorage.setItem('roleta_logado', JSON.stringify(novoUser));
            fecharModalAuth(); atualizarInterfaceLogado(); verificarEExecutarEventosSazonais();
        }

        function executarLogin(e) {
            e.preventDefault();
            let inp = document.getElementById('loginUser').value.trim().toLowerCase();
            let mockUser = {
                id: inp === "admin" ? "#1122264" : "#" + Math.floor(1000000 + Math.random() * 9000000).toString(),
                nome: inp.toUpperCase(), user: inp, emoji: "🎯", nivel: 1, xp: 0, pontos: 0
            };
            usuarioLogado = mockUser; localStorage.setItem('roleta_logado', JSON.stringify(mockUser));
            fecharModalAuth(); atualizarInterfaceLogado(); verificarEExecutarEventosSazonais();
        }

        function executarLogout() {
            usuarioLogado = null; localStorage.removeItem('roleta_logado');
            eventoForcadoChave = "";
            document.getElementById('selectForcarEvento').value = "";
            atualizarInterfaceLogado(); verificarEExecutarEventosSazonais();
        }

        function abrirModalAuth() { document.getElementById('modalAuth').style.display='flex'; }
        function fecharModalAuth() { document.getElementById('modalAuth').style.display='none'; }

        function obterDesafiosFiltrados() { return desafios.filter(d => filtrosAtivos[d.dif] === true); }

        function desenharRoleta() {
            let lista = obterDesafiosFiltrados(); ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(lista.length === 0) return;

            let tamAng = (2 * Math.PI) / lista.length;
            let bodyStyle = getComputedStyle(document.body);
            
            let c1 = bodyStyle.getPropertyValue('--roleta-fundo-1').trim() || "#1a1d2d";
            let c2 = bodyStyle.getPropertyValue('--roleta-fundo-2').trim() || "#24293e";
            let txtC = bodyStyle.getPropertyValue('--roleta-texto').trim() || "#ffffff";
            let bordaC = bodyStyle.getPropertyValue('--roleta-borda').trim() || "rgba(255, 255, 255, 0.1)";

            if (window.sazonalAtivoDados) {
                c1 = window.sazonalAtivoDados.fatia;
                c2 = window.sazonalAtivoDados.fatia;
                txtC = window.sazonalAtivoDados.letras;
                bordaC = window.sazonalAtivoDados.borda;
            }

            lista.forEach((d, i) => {
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamAng, (i + 1) * tamAng);
                ctx.fillStyle = (i % 2 === 0) ? c1 : c2;
                ctx.fill(); ctx.strokeStyle = bordaC; ctx.stroke();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * tamAng + tamAng/2);
                ctx.textAlign = "right"; ctx.fillStyle = txtC; ctx.font = "bold 13px sans-serif";
                ctx.fillText(d.texto.substring(0, 15), 210, 5); ctx.restore();
            });
        }

        function girarRoleta() {
            if(estaGirando) return;
            let lista = obterDesafiosFiltrados(); if(lista.length === 0) return;
            estaGirando = true; clearInterval(cronometroInterval);

            let voltas = 6 + Math.floor(Math.random() * 4); let graus = Math.floor(Math.random() * 360);
            anguloAtual += (voltas * 360) + graus; canvas.style.transform = `rotate(${anguloAtual}deg)`;

            setTimeout(() => {
                estaGirando = false;
                let grFin = (360 - (anguloAtual % 360) + 270) % 360;
                let idx = Math.floor(grFin / (360 / lista.length)) % lista.length;
                desafioSorteadoGlobal = lista[idx];

                document.getElementById('desafioAtualTexto').innerText = `Missão: "${desafioSorteadoGlobal.texto}"`;
                document.getElementById('painelValidacao').style.display = 'flex';
            }, 3500);
        }

        function validarResultado(cumpriu) {
            document.getElementById('painelValidacao').style.display = 'none';
            if(cumpriu && usuarioLogado) {
                usuarioLogado.xp = (usuarioLogado.xp || 0) + 10;
                let max = 50 + (usuarioLogado.nivel - 1) * 25;
                if(usuarioLogado.xp >= max) { usuarioLogado.xp -= max; usuarioLogado.nivel += 1; }
                localStorage.setItem('roleta_logado', JSON.stringify(usuarioLogado));
                atualizarInterfaceLogado();
            }
            document.getElementById('historico').innerText = cumpriu ? "Última missão cumprida com sucesso!" : "A missão anterior foi fracassada.";
        }

        function adicionarJogador() {
            let nome = document.getElementById('nome-jogador').value.trim(); if(!nome) return;
            jogadoresLocais.push({ nome, pontos: 0 }); document.getElementById('nome-jogador').value = "";
            atualizarJogadores();
        }
        function atualizarJogadores() {
            let cont = document.getElementById('listaJogadoresContainer'); cont.innerHTML = "";
            jogadoresLocais.forEach(j => { cont.innerHTML += `<div class="jogador-item">👤 <span>${j.nome}</span></div>`; });
        }
        function adicionarDesafio() {
            let txt = document.getElementById('texto-desafio').value.trim(); if(!txt) return;
            desafios.push({ texto: txt, dif: document.getElementById('dificuldade-desafio').value });
            document.getElementById('texto-desafio').value = ""; desenharRoleta();
        }
        function mudarFiltro(d) { filtrosAtivos[d] = !filtrosAtivos[d]; desenharRoleta(); }
        function atualizarDisplayTempo() { document.getElementById('cronometro').innerText = "00:" + document.getElementById('tempoInput').value; }
        function toggleTemporizadorVisivel() {}
    </script>
