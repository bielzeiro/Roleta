<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Desafios Pro</title>
    <style>
        :root {
            --bg-principal: #121420;
            --bg-painel: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --texto: #f0f2f5;
            --primaria: #00f2fe;
            --secundaria: #4facfe;
            --botao-girar: #ff2a5f;
            
            /* Cores padrão das fatias (editáveis via painel) */
            --cor-facil: #00f2fe;
            --cor-txt-facil: #121420;
            --cor-medio: #ffcc00;
            --cor-txt-medio: #121420;
            --cor-dificil: #ff2a5f;
            --cor-txt-dificil: #ffffff;
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f9;
            --bg-painel: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --texto: #1a1d24;
            --primaria: #0072ff;
            --secundaria: #00c6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .creditos h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .creditos strong {
            color: var(--primaria);
        }

        .header-controles {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-header {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-header:hover {
            border-color: var(--primaria);
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 25px;
            max-width: 1000px;
            margin: 30px auto;
            width: 100%;
        }

        .area-roleta {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 20px;
        }

        .cronometro-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: var(--bg-painel);
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .cronometro-container {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--primaria);
        }

        .cronometro-controles {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .cronometro-controles input[type="number"] {
            width: 55px;
            padding: 4px 6px;
            font-size: 12px;
            text-align: center;
        }

        .cronometro-controles label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.8;
        }

        .giros-contador {
            font-size: 14px;
            opacity: 0.8;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .giros-contador input {
            width: 50px;
            padding: 2px 5px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            color: var(--primaria);
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
        }

        .roleta-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marcador-topo {
            position: absolute;
            top: -10px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--botao-girar);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .btn-centro-girar {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--botao-girar);
            border: 4px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
            z-index: 12;
        }

        .painel-validacao {
            width: 100%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            gap: 12px;
            text-align: center;
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .painel-validacao h3 {
            font-size: 14px;
            color: var(--primaria);
        }

        .desafio-atual-texto {
            font-size: 16px;
            font-weight: bold;
            margin: 5px 0;
        }

        .botoes-validacao {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-validar {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            color: #121420;
        }

        .btn-validar.sucesso {
            background: #00f2fe;
        }

        .btn-validar.falha {
            background: #ff2a5f;
            color: white;
        }

        .secao-configuracoes {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .secao-configuracoes {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        .card-titulo {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primaria);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .botoes-dificuldade {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-dif {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: var(--texto);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-dif.ativo {
            border-color: var(--primaria);
            background: rgba(0, 242, 254, 0.15);
        }

        .input-grupo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-grupo label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .grid-cores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .cor-seletor-bloco {
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 11px;
        }

        .cor-seletor-bloco span {
            font-weight: 600;
        }

        select, input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        .input-add-grupo {
            display: flex;
            gap: 8px;
        }

        .btn-acao {
            background: var(--primaria);
            color: #121420;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-acao.apagar {
            background: #ff4a4a;
            color: white;
        }

        .lista-jogadores {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
        }

        .jogador-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .jogador-item.ativo {
            border-color: var(--primaria);
            background: rgba(0, 242, 254, 0.12);
        }

        .avatar-preview {
            width: 32px;
            height: 32px;
            background: var(--secundaria);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .jogador-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .jogador-nome {
            font-size: 13px;
            font-weight: 600;
        }

        .jogador-pontos {
            font-size: 13px;
        }

        .historico-caixa {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            height: 80px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.8;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="creditos">
            <h1><strong>Roleta</strong></h1>
        </div>
        <div class="header-controles">
            <button class="btn-header" onclick="alternarModo()">🌓 Modo</button>
            <button class="btn-header" style="border-color: var(--primaria);">👤 Login Opcional</button>
        </div>
    </header>

    <main class="dashboard">
        
        <section class="area-roleta">
            <div class="cronometro-wrapper">
                <div class="cronometro-container" id="cronometro">00:30</div>
                <div class="cronometro-controles">
                    <label>Tempo (s): 
                        <input type="number" id="tempoInput" value="30" min="5" max="300" onchange="atualizarDisplayTempo()">
                    </label>
                    <label>
                        <input type="checkbox" id="ativarTempo" checked> Ativo
                    </label>
                </div>
            </div>

            <div class="giros-contador">
                <span>Giros Disponíveis:</span>
                <input type="number" id="girosInput" value="5" min="1" max="99">
            </div>

            <div class="roleta-wrapper">
                <div class="marcador-topo"></div>
                <canvas id="roletaCanvas" width="500" height="500"></canvas>
                <button class="btn-centro-girar" id="btnGirar" onclick="girarRoleta()">Girar</button>
            </div>

            <div class="painel-validacao" id="painelValidacao">
                <h3 id="validacaoTitulo">Validar Missão</h3>
                <div class="desafio-atual-texto" id="desafioAtualTexto">"Desafio"</div>
                <div class="botoes-validacao">
                    <button class="btn-validar sucesso" onclick="validarResultado(true)">Cumpriu 👍</button>
                    <button class="btn-validar falha" onclick="validarResultado(false)">Não Cumpriu 👎</button>
                </div>
            </div>

            <div class="card" style="width: 100%; max-width: 500px; padding: 12px;">
                <div class="historico-caixa" id="historico">Prontos para rodar! Adicione jogadores e desafios abaixo.</div>
            </div>
        </section>

        <section class="secao-configuracoes">
            
            <div class="card">
                <div class="card-titulo">👥 Configurar Jogadores (Máx 5)</div>
                <div class="input-add-grupo" style="margin-bottom: 15px;">
                    <input type="text" id="nome-jogador" placeholder="Nome do jogador...">
                    <select id="emoji-jogador" style="width: 90px;">
                        <option value="🤍">🤍</option>
                        <option value="❤️">❤️</option>
                        <option value="💀">💀</option>
                        <option value="👻">👻</option>
                        <option value="👑">👑</option>
                        <option value="🐍">🐍</option>
                        <option value="🦉">🦉</option>
                        <option value="🌙">🌙</option>
                        <option value="🌞">🌞</option>
                        <option value="😎">😎</option>
                        <option value="⚔️">⚔️</option>
                        <option value="🇧🇷">🇧🇷</option>
                        <option value="🔥">🔥</option>
                        <option value="👾">👾</option>
                        <option value="🦊">🦊</option>
                        <option value="💎">💎</option>
                        <option value="🍕">🍕</option>
                        <option value="🚀">🚀</option>
                        <option value="🍀">🍀</option>
                        <option value="🎭">🎭</option>
                    </select>
                    <button class="btn-acao" onclick="adicionarJogador()">+ Entrar</button>
                </div>
                <div class="lista-jogadores" id="listaJogadoresContainer"></div>
            </div>

            <div class="card">
                <div class="card-titulo">📝 Editor de Fatias & Cores</div>
                
                <div class="input-grupo">
                    <label>Customizar Cores da Roleta</label>
                    <div class="grid-cores">
                        <div class="cor-seletor-bloco" style="border-top: 3px solid var(--cor-facil);">
                            <span>Fácil 🟢</span>
                            <select id="corFundoFacil" onchange="atualizarCoresCustomizadas()">
                                <option value="#00f2fe" selected>Ciano</option>
                                <option value="#4facfe">Azul</option>
                                <option value="#ffffff">Branco</option>
                                <option value="#f0f2f5">Cinza</option>
                                <option value="#ff69b4">Rosa</option>
                                <option value="#ffcc00">Amarelo</option>
                                <option value="#ff2a5f">Vermelho</option>
                                <option value="#ffaa00">Laranja</option>
                                <option value="#8b5a2b">Marrom</option>
                                <option value="#121420">Preto</option>
                            </select>
                            <select id="corTxtFacil" onchange="atualizarCoresCustomizadas()">
                                <option value="#121420" selected>Texto Preto</option>
                                <option value="#ffffff">Texto Branco</option>
                            </select>
                        </div>
                        <div class="cor-seletor-bloco" style="border-top: 3px solid var(--cor-medio);">
                            <span>Médio 🟡</span>
                            <select id="corFundoMedio" onchange="atualizarCoresCustomizadas()">
                                <option value="#ffcc00" selected>Amarelo</option>
                                <option value="#ffaa00">Laranja</option>
                                <option value="#4facfe">Azul</option>
                                <option value="#00f2fe">Ciano</option>
                                <option value="#ff69b4">Rosa</option>
                                <option value="#ffffff">Branco</option>
                                <option value="#f0f2f5">Cinza</option>
                                <option value="#ff2a5f">Vermelho</option>
                                <option value="#8b5a2b">Marrom</option>
                                <option value="#121420">Preto</option>
                            </select>
                            <select id="corTxtMedio" onchange="atualizarCoresCustomizadas()">
                                <option value="#121420" selected>Texto Preto</option>
                                <option value="#ffffff">Texto Branco</option>
                            </select>
                        </div>
                        <div class="cor-seletor-bloco" style="border-top: 3px solid var(--cor-dificil);">
                            <span>Difícil 🔴</span>
                            <select id="corFundoDificil" onchange="atualizarCoresCustomizadas()">
                                <option value="#ff2a5f" selected>Vermelho</option>
                                <option value="#ffaa00">Laranja</option>
                                <option value="#ff69b4">Rosa</option>
                                <option value="#8b5a2b">Marrom</option>
                                <option value="#4facfe">Azul</option>
                                <option value="#00f2fe">Ciano</option>
                                <option value="#ffcc00">Amarelo</option>
                                <option value="#ffffff">Branco</option>
                                <option value="#f0f2f5">Cinza</option>
                                <option value="#121420">Preto</option>
                            </select>
                            <select id="corTxtDificil" onchange="atualizarCoresCustomizadas()">
                                <option value="#ffffff" selected>Texto Branco</option>
                                <option value="#121420">Texto Preto</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="input-grupo">
                    <label>Dificuldade Ativa do Jogo</label>
                    <div class="botoes-dificuldade">
                        <button class="btn-dif ativo" id="filtro-facil" onclick="mudarFiltro('Fácil')">Fácil 🟢</button>
                        <button class="btn-dif ativo" id="filtro-medio" onclick="mudarFiltro('Médio')">Médio 🟡</button>
                        <button class="btn-dif ativo" id="filtro-dificil" onclick="mudarFiltro('Difícil')">Difícil 🔴</button>
                    </div>
                </div>

                <div class="input-grupo">
                    <label>Novo Desafio</label>
                    <div class="input-add-grupo">
                        <input type="text" id="texto-desafio" placeholder="O que fazer...">
                        <select id="dificuldade-desafio" style="width: 110px;">
                            <option value="Fácil">Fácil</option>
                            <option value="Médio">Médio</option>
                            <option value="Difícil">Difícil</option>
                        </select>
                        <button class="btn-acao" onclick="adicionarDesafio()">Add</button>
                    </div>
                </div>

                <div class="input-grupo" style="margin-bottom: 0;">
                    <label>Remover Desafio</label>
                    <div class="input-add-grupo">
                        <select id="seletor-remover"></select>
                        <button class="btn-acao apagar" onclick="removerDesafio()">Apagar</button>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <footer style="text-align: center; padding: 20px; font-size: 13px; opacity: 0.6; border-top: 1px solid var(--border-color); margin-top: auto;">
        Criado por <strong>bielzeiro</strong> & <strong>Gemini AI</strong>
    </footer>

    <script>
        let jogadores = [];
        let jugadorAtualIndex = 0;
        let estaGirando = false;
        let anguloAtual = 0;
        
        let desafioSorteadoAtual = null;
        let pontosSorteadosAtuais = 0;

        let desafios = [
            { texto: "Equilibrar num pé só", dif: "Fácil" },
            { texto: "Ficar estátua por 20s", dif: "Fácil" },
            { texto: "Imitar um macaco", dif: "Médio" },
            { texto: "Pagar 10 flexões", dif: "Difícil" }
        ];

        let filtrosAtivos = { "Fácil": true, "Médio": true, "Difícil": true };

        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');

        let audioCtx = null;

        function inicializarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function tocarSomTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function tocarSomSucesso() {
            if (!audioCtx) return;
            const notas = [440, 554, 659, 880];
            notas.forEach((nota, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(nota, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.2);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.2);
            });
        }

        function tocarSomAlarme() {
            if (!audioCtx) return;
            for(let i = 0; i < 3; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + i * 0.25);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.25);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.25 + 0.2);
                osc.start(audioCtx.currentTime + i * 0.25);
                osc.stop(audioCtx.currentTime + i * 0.25 + 0.2);
            }
        }

        function atualizarCoresCustomizadas() {
            const root = document.documentElement;
            
            const fundoFacil = document.getElementById('corFundoFacil').value;
            const txtFacil = document.getElementById('corTxtFacil').value;
            const fundoMedio = document.getElementById('corFundoMedio').value;
            const txtMedio = document.getElementById('corTxtMedio').value;
            const fundoDificil = document.getElementById('corFundoDificil').value;
            const txtDificil = document.getElementById('corTxtDificil').value;

            root.style.setProperty('--cor-facil', fundoFacil);
            root.style.setProperty('--cor-txt-facil', txtFacil);
            root.style.setProperty('--cor-medio', fundoMedio);
            root.style.setProperty('--cor-txt-medio', txtMedio);
            root.style.setProperty('--cor-dificil', fundoDificil);
            root.style.setProperty('--cor-txt-dificil', txtDificil);

            desenharRoleta();
        }

        function obterDesafiosFiltrados() {
            return desafios.filter(d => filtrosAtivos[d.dif]);
        }

        function desenharRoleta() {
            const lista = obterDesafiosFiltrados();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (lista.length === 0) {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--texto').trim();
                ctx.font = "16px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("Ative alguma dificuldade abaixo!", 250, 250);
                return;
            }

            const tamanhoAngulo = (2 * Math.PI) / lista.length;
            const rootStyle = getComputedStyle(document.documentElement);

            lista.forEach((desafio, i) => {
                let corFundo = '#4facfe';
                let corTexto = '#ffffff';

                if (desafio.dif === 'Fácil') {
                    corFundo = rootStyle.getPropertyValue('--cor-facil').trim();
                    corTexto = rootStyle.getPropertyValue('--cor-txt-facil').trim();
                } else if (desafio.dif === 'Médio') {
                    corFundo = rootStyle.getPropertyValue('--cor-medio').trim();
                    corTexto = rootStyle.getPropertyValue('--cor-txt-medio').trim();
                } else if (desafio.dif === 'Difícil') {
                    corFundo = rootStyle.getPropertyValue('--cor-dificil').trim();
                    corTexto = rootStyle.getPropertyValue('--cor-txt-dificil').trim();
                }

                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamanhoAngulo, (i + 1) * tamanhoAngulo);
                ctx.fillStyle = corFundo;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = rootStyle.getPropertyValue('--bg-principal').trim();
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(i * tamanhoAngulo + tamanhoAngulo / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = corTexto;
                ctx.font = "bold 13px sans-serif";
                
                let txtCurto = desafio.texto.length > 20 ? desafio.texto.substring(0, 18) + "..." : desafio.texto;
                ctx.fillText(txtCurto, 220, 5);
                ctx.restore();
            });
        }

        function atualizarDisplayTempo() {
            const tempoInput = document.getElementById('tempoInput');
            let valor = parseInt(tempoInput.value) || 30;
            const minutos = Math.floor(valor / 60);
            const segundos = valor % 60;
            document.getElementById('cronometro').innerText = 
                `${minutos < 10 ? '0' + minutos : minutos}:${segundos < 10 ? '0' + segundos : segundos}`;
        }

        function atualizarJogadores() {
            const container = document.getElementById('listaJogadoresContainer');
            container.innerHTML = '';
            
            if (jogadores.length === 0) {
                container.innerHTML = '<div style="font-size: 13px; opacity: 0.5; padding: 10px; text-align: center;">Nenhum jogador em jogo.</div>';
                return;
            }

            jogadores.forEach((j, idx) => {
                const classeAtivo = idx === jugadorAtualIndex ? 'ativo' : '';
                container.innerHTML += `
                    <div class="jogador-item ${classeAtivo}">
                        <div class="avatar-preview">${j.avatar}</div>
                        <div class="jogador-info">
                            <span class="jogador-nome">${j.nome} ${idx === jugadorAtualIndex ? '⚡' : ''}</span>
                            <span class="jogador-pontos"><strong>${j.pontos} pts</strong></span>
                        </div>
                    </div>
                `;
            });
        }

        function atualizarSeletores() {
            const seletor = document.getElementById('seletor-remover');
            seletor.innerHTML = '';
            desafios.forEach((d, idx) => {
                seletor.innerHTML += `<option value="${idx}">${d.texto} (${d.dif})</option>`;
            });
        }

        function adicionarJogador() {
            inicializarAudio();
            const input = document.getElementById('nome-jogador');
            const selectEmoji = document.getElementById('emoji-jogador');
            const nome = input.value.trim();
            if (!nome) return;
            
            if (jogadores.length >= 5) {
                alert("Máximo de 5 jogadores atingido!");
                return;
            }

            jogadores.push({
                nome: nome,
                pontos: 0,
                avatar: selectEmoji.value
            });

            input.value = '';
            atualizarJogadores();
        }

        function adicionarDesafio() {
            const txtInput = document.getElementById('texto-desafio');
            const difSelect = document.getElementById('dificuldade-desafio');
            const texto = txtInput.value.trim();

            if (!texto) return;

            desafios.push({ texto: texto, dif: difSelect.value });
            txtInput.value = '';
            
            atualizarSeletores();
            desenharRoleta();
        }

        function removerDesafio() {
            const seletor = document.getElementById('seletor-remover');
            const idx = seletor.value;
            if (idx === '') return;

            desafios.splice(Number(idx), 1);
            atualizarSeletores();
            desenharRoleta();
        }

        function mudarFiltro(dif) {
            filtrosAtivos[dif] = !filtrosAtivos[dif];
            
            let idBotao = 'filtro-facil';
            if (dif === 'Médio') idBotao = 'filtro-medio';
            if (dif === 'Difícil') idBotao = 'filtro-dificil';

            const btn = document.getElementById(idBotao);
            if (filtrosAtivos[dif]) {
                btn.classList.add('ativo');
            } else {
                btn.classList.remove('ativo');
            }
            desenharRoleta();
            atualizarSeletores();
        }

        function girarRoleta() {
            if (estaGirando) return;
            inicializarAudio();

            const girosInput = document.getElementById('girosInput');
            let girosRestantes = parseInt(girosInput.value);

            if (isNaN(girosRestantes) || girosRestantes <= 0) {
                return; 
            }

            const lista = obterDesafiosFiltrados();
            if (lista.length === 0) return;

            estaGirando = true;
            document.getElementById('painelValidacao').style.display = 'none';
            if(window.cronometroAtivo) clearInterval(window.cronometroAtivo);
            
            girosRestantes--;
            girosInput.value = girosRestantes;

            const voltasExtras = 5 + Math.floor(Math.random() * 5);
            const grausSorteados = Math.floor(Math.random() * 360);
            anguloAtual += (voltasExtras * 360) + grausSorteados;

            canvas.style.transform = `rotate(${anguloAtual}deg)`;

            let ticksMax = 25;
            for (let i = 0; i < ticksMax; i++) {
                let atrasoExponential = Math.pow(i / (ticksMax - 1), 2) * 3300; 
                setTimeout(() => {
                    if (estaGirando) tocarSomTick();
                }, atrasoExponential);
            }

            setTimeout(() => {
                estaGirando = false;
                tocarSomSucesso();
                
                const grausFinais = (360 - (anguloAtual % 360) + 270) % 360;
                const tamanhoAngulo = 360 / lista.length;
                const indexGanho = Math.floor(grausFinais / tamanhoAngulo) % lista.length;
                
                desafioSorteadoAtual = lista[indexGanho];
                const pontosPorDif = { "Fácil": 10, "Médio": 20, "Difícil": 40 };
                pontosSorteadosAtuais = pontosPorDif[desafioSorteadoAtual.dif] || 10;

                const playerNome = jogadores.length > 0 ? jogadores[jugadorAtualIndex].nome : "Jogador";
                document.getElementById('validacaoTitulo').innerHTML = `Vez de: <strong>${playerNome}</strong>`;
                document.getElementById('desafioAtualTexto').innerText = `"${desafioSorteadoAtual.texto}" [${desafioSorteadoAtual.dif}]`;
                document.getElementById('painelValidacao').style.display = 'flex';

                if (jogadores.length > 0) {
                    document.getElementById('historico').innerHTML = `🎯 Sorteado para <strong>${jogadores[jugadorAtualIndex].nome}</strong>: "${desafioSorteadoAtual.texto}"`;
                } else {
                    document.getElementById('historico').innerHTML = `🎯 Sorteado: "${desafioSorteadoAtual.texto}"`;
                }

                if (document.getElementById('ativarTempo').checked) {
                    iniciarCronometro();
                }
            }, 3500);
        }

        function validarResultado(cumpriu) {
            if(window.cronometroAtivo) clearInterval(window.cronometroAtivo);
            document.getElementById('painelValidacao').style.display = 'none';

            if (jogadores.length > 0) {
                const jogadorDeAgora = jogadores[jugadorAtualIndex];
                
                if (cumpriu) {
                    jogadorDeAgora.pontos += pontosSorteadosAtuais;
                    document.getElementById('historico').innerHTML = `✅ <strong>${jogadorDeAgora.nome}</strong> CUMPRIU e ganhou +${pontosSorteadosAtuais} pts!`;
                } else {
                    document.getElementById('historico').innerHTML = `❌ <strong>${jogadorDeAgora.nome}</strong> NÃO cumpriu a missão.`;
                }

                jugadorAtualIndex = (jugadorAtualIndex + 1) % jogadores.length;
                atualizarJogadores();
            } else {
                document.getElementById('historico').innerHTML = cumpriu ? `✅ Desafio concluído!` : `❌ Desafio não concluído.`;
            }

            const girosRestantes = parseInt(document.getElementById('girosInput').value);
            if (girosRestantes > 0) {
                setTimeout(() => {
                    girarRoleta();
                }, 1500);
            } else {
                document.getElementById('historico').innerHTML += " 🏁 <strong>Fim da rodada de giros!</strong>";
            }
        }

        function iniciarCronometro() {
            let tempoInput = document.getElementById('tempoInput');
            let tempo = parseInt(tempoInput.value) || 30;
            
            if(window.cronometroAtivo) clearInterval(window.cronometroAtivo);

            const atualizarDisplay = (t) => {
                const minutos = Math.floor(t / 60);
                const segundos = t % 60;
                document.getElementById('cronometro').innerText = 
                    `${minutos < 10 ? '0' + minutos : minutes}:${segundos < 10 ? '0' + segundos : segundos}`;
            };

            atualizarDisplay(tempo);

            window.cronometroAtivo = setInterval(() => {
                tempo--;
                atualizarDisplay(tempo);
                if (tempo <= 0) {
                    clearInterval(window.cronometroAtivo);
                    tocarSomAlarme();
                }
            }, 1000);
        }

        function alternarModo() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
            desenharRoleta();
        }

        atualizarJogadores();
        atualizarSeletores();
        desenharRoleta();
        atualizarDisplayTempo();
    </script>
</body>
</html>
