<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Desafios Pro</title>
    <style>
        :root {
            --bg-principal: #121420;
            --bg-painel: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --texto: #f0f2f5;
            --primaria: #00f2fe;
            --secundaria: #4facfe;
            --botao-girar: #ff2a5f;
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f9;
            --bg-painel: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --texto: #1a1d24;
            --primaria: #0072ff;
            --secundaria: #00c6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .creditos h1 {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 400;
        }

        .creditos strong {
            color: var(--primaria);
        }

        .header-controles {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-header {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-header:hover {
            border-color: var(--primaria);
        }

        /* Dashboard mudado para Coluna para deixar a roleta no topo */
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* ÁREA DA ROLETA EM DESTAQUE NO TOPO */
        .area-roleta {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 20px;
        }

        .cronometro-container {
            font-size: 32px;
            font-weight: 700;
            background: var(--bg-painel);
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            letter-spacing: 1px;
            color: var(--primaria);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .roleta-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marcador-topo {
            position: absolute;
            top: -10px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--botao-girar);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-centro-girar {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--botao-girar);
            border: 4px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        .giros-contador {
            font-size: 14px;
            opacity: 0.8;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* PAINÉIS DE CONFIGURAÇÃO ABAIXO DA ROLETA */
        .secao-configuracoes {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .secao-configuracoes {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        .card-titulo {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primaria);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Filtros Ativos */
        .botoes-dificuldade {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-dif {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: var(--texto);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-dif.ativo {
            border-color: var(--primaria);
            background: rgba(0, 242, 254, 0.15);
        }

        /* Inputs e Formulários */
        .input-grupo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-grupo label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        select, input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        .input-add-grupo {
            display: flex;
            gap: 8px;
        }

        .btn-acao {
            background: var(--primaria);
            color: #121420;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-acao.apagar {
            background: #ff4a4a;
            color: white;
        }

        /* Lista de Jogadores */
        .lista-jogadores {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
        }

        .jogador-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .jogador-item.ativo {
            border-color: var(--primaria);
            background: rgba(0, 242, 254, 0.05);
        }

        .avatar-preview {
            width: 32px;
            height: 32px;
            background: var(--secundaria);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .jogador-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .historico-caixa {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            height: 80px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.8;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="creditos">
            <h1>Criado por <strong>bielzeiro</strong> & <strong>Gemini AI</strong></h1>
        </div>
        <div class="header-controles">
            <button class="btn-header" onclick="alternarModo()">🌓 Modo</button>
            <button class="btn-header" style="border-color: var(--primaria);">👤 Login Opcional</button>
        </div>
    </header>

    <main class="dashboard">
        
        <section class="area-roleta">
            <div class="cronometro-container" id="cronometro">00:30</div>
            <div class="giros-contador" id="girosContador">Giros Restantes: 3</div>

            <div class="roleta-wrapper">
                <div class="marcador-topo"></div>
                <canvas id="roletaCanvas" width="500" height="500"></canvas>
                <button class="btn-centro-girar" id="btnGirar" onclick="girarRoleta()">Girar</button>
            </div>

            <div class="card" style="width: 100%; max-width: 500px; padding: 12px;">
                <div class="historico-caixa" id="historico">Prontos para rodar! Adicione jogadores e desafios abaixo.</div>
            </div>
        </section>

        <section class="secao-configuracoes">
            
            <div class="card">
                <div class="card-titulo">👥 Configurar Jogadores (Máx 5)</div>
                <div class="input-add-grupo" style="margin-bottom: 15px;">
                    <input type="text" id="nome-jogador" placeholder="Nome do jogador...">
                    <button class="btn-acao" onclick="adicionarJogador()">+ Entrar</button>
                </div>
                <div class="lista-jogadores" id="listaJogadoresContainer">
                    </div>
            </div>

            <div class="card">
                <div class="card-titulo">📝 Editor de Fatias</div>
                
                <div class="input-grupo">
                    <label>Dificuldade Ativa do Jogo</label>
                    <div class="botoes-dificuldade">
                        <button class="btn-dif ativo" id="filtro-facil" onclick="mudarFiltro('Fácil')">Fácil 🟢</button>
                        <button class="btn-dif ativo" id="filtro-medio" onclick="mudarFiltro('Médio')">Médio 🟡</button>
                        <button class="btn-dif ativo" id="filtro-dificil" onclick="mudarFiltro('Difícil')">Difícil 🔴</button>
                    </div>
                </div>

                <div class="input-grupo">
                    <label>Novo Desafio</label>
                    <div class="input-add-grupo">
                        <input type="text" id="texto-desafio" placeholder="O que fazer...">
                        <select id="Dificuldade-desafio" style="width: 110px;">
                            <option value="Fácil">Fácil</option>
                            <option value="Médio">Médio</option>
                            <option value="Difícil">Difícil</option>
                        </select>
                        <button class="btn-acao" onclick="adicionarDesafio()">Add</button>
                    </div>
                </div>

                <div class="input-grupo" style="margin-bottom: 0;">
                    <label>Remover Desafio</label>
                    <div class="input-add-grupo">
                        <select id="seletor-remover"></select>
                        <button class="btn-acao apagar" onclick="removerDesafio()">Apagar</button>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <script>
        // Banco de dados em memória interna
        let jogadores = [
            { nome: "Bielzeiro", pontos: 0, avatar: "👑" }
        ];
        let jogadorAtualIndex = 0;
        let girosRestantes = 3;
        let estaGirando = false;

        let desafios = [
            { texto: "Equilibrar num pé só", dif: "Fácil" },
            { texto: "Ficar estátua por 20s", dif: "Fácil" },
            { texto: "Imitar um macaco", dif: "Médio" },
            { texto: "Pagar 10 flexões", dif: "Difícil" }
        ];

        let filtrosAtivos = { "Fácil": true, "Médio": true, "Difícil": true };

        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');

        function obterDesafiosFiltrados() {
            return desafios.filter(d => filtrosAtivos[d.dif]);
        }

        function desenharRoleta() {
            const lista = obterDesafiosFiltrados();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (lista.length === 0) {
                ctx.fillStyle = varColor('--texto');
                ctx.font = "16px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("Nenhum desafio ativo para estes filtros", 250, 250);
                return;
            }

            const tamanhoAngulo = (2 * Math.PI) / lista.length;
            const cores = { "Fácil": "#00f2fe", "Médio": "#ffcc00", "Difícil": "#ff2a5f" };

            lista.forEach((desafio, i) => {
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamanhoAngulo, (i + 1) * tamanhoAngulo);
                ctx.fillStyle = cores[desafio.dif] || "#4facfe";
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(i * tamanhoAngulo + tamanhoAngulo / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#121420";
                ctx.font = "bold 13px sans-serif";
                
                let txt Curto = desafio.texto.length > 22 ? desafio.texto.substring(0, 20) + "..." : desafio.texto;
                ctx.fillText(txtCurto, 220, 5);
                ctx.restore();
            });
        }

        function atualizarJogadores() {
            const container = document.getElementById('listaJogadoresContainer');
            container.innerHTML = '';
            jogadores.forEach((j, idx) => {
                const classeAtivo = idx === jogadorAtualIndex ? 'ativo' : '';
                container.innerHTML += `
                    <div class="jogador-item ${classeAtivo}">
                        <div class="avatar-preview">${j.avatar}</div>
                        <div class="jogador-info">
                            <span class="jogador-nome">${j.nome}</span>
                            <span class="jogador-pontos"><strong>${j.pontos} pts</strong></span>
                        </div>
                    </div>
                `;
            });
        }

        function atualizarSeletores() {
            const seletor = document.getElementById('seletor-remover');
            seletor.innerHTML = '';
            desafios.forEach((d, idx) => {
                seletor.innerHTML += `<option value="${idx}">${d.texto} [${d.dif}]</option>`;
            });
        }

        function adicionarJogador() {
            const input = document.getElementById('nome-jogador');
            if (!input.value.trim()) return;
            if (jogadores.length >= 5) {
                alert("Limite máximo de 5 jogadores atingido!");
                return;
            }
            const avatares = ["🦊", "🥷", "🚀", "👻", "💎"];
            jogadores.push({
                nome: input.value.trim(),
                pontos: 0,
                avatar: avatares[jogadores.length % avatares.length]
            });
            input.value = '';
            atualizarJogadores();
        }

        function adicionarDesafio() {
            const txt = document.getElementById('texto-desafio');
            const dif = document.getElementById('Dificuldade-desafio');
            if (!txt.value.trim()) return;
            
            desafios.push({ texto: txt.value.trim(), dif: dif.value });
            txt.value = '';
            atualizarSeletores();
            desenharRoleta();
        }

        function removerDesafio() {
            const seletor = document.getElementById('seletor-remover');
            if (seletor.value === '') return;
            desafios.splice(Number(seletor.value), 1);
            atualizarSeletores();
            desenharRoleta();
        }

        function mudarFiltro(dif) {
            filtrosAtivos[dif] = !filtrosAtivos[dif];
            const btn = document.getElementById(`filtro-${dif.toLowerCase().replace('á','a').replace('í','i')}`);
            if (filtrosAtivos[dif]) btn.classList.add('ativo');
            else btn.classList.remove('ativo');
            desenharRoleta();
        }

        function girarRoleta() {
            if (estaGirando || girosRestantes <= 0) return;
            const lista = obterDesafiosFiltrados();
            if (lista.length === 0) return;

            estaGirando = true;
            girosRestantes--;
            document.getElementById('girosContador').innerText = `Giros Restantes: ${girosRestantes}`;

            let grausAtuais = 0;
            const grausTotais = 1800 + Math.random() * 360;
            const tempoGiro = 3500;
            const inicio = performance.now();

            function animar(agora) {
                const progresso = (agora - inicio) / tempoGiro;
                if (progresso < 1) {
                    const easeOut = 1 - Math.pow(1 - progresso, 4);
                    grausAtuais = easeOut * grausTotais;
                    canvas.style.transform = `rotate(${grausAtuais}deg)`;
                    requestAnimationFrame(animar);
                } else {
                    canvas.style.transform = `rotate(${grausTotais}deg)`;
                    estaGirando = false;
                    processarResultado(grausTotais, lista);
                }
            }
            requestAnimationFrame(animar);
        }

        function processarResultado(graus, lista) {
            const grausNorm = (360 - (graus % 360) + 270) % 360;
            const tamanhoAngulo = 360 / lista.length;
            const indexGanho = Math.floor(grausNorm / tamanhoAngulo) % lista.length;
            const desafioSorteado = lista[indexGanho];

            // Atribuição de pontos com base na dificuldade do desafio sorteado
            const pontosPorDif = { "Fácil": 10, "Médio": 20, "Difícil": 40 };
            const ptsganhos = pontosPorDif[desafioSorteado.dif] || 10;

            if (jogadores.length > 0) {
                jogadores[jogadorAtualIndex].pontos += ptsganhos;
                document.getElementById('historico').innerHTML = `🎯 <strong>${jogadores[jogadorAtualIndex].nome}</strong> tirou: "${desafioSorteado.texto}" [${desafioSorteado.dif}] (+${ptsganhos} pts)`;
                
                // Passa para o próximo jogador da rodada
                jogadorAtualIndex = (jogadorAtualIndex + 1) % jogadores.length;
            }

            atualizarJogadores();
            iniciarCronometro();
        }

        function iniciarCronometro() {
            let tempo = 30;
            document.getElementById('cronometro').innerText = "00:30";
            const intervalo = setInterval(() => {
                tempo--;
                document.getElementById('cronometro').innerText = `00:${tempo < 10 ? '0' + tempo : tempo}`;
                if (tempo <= 0) {
                    clearInterval(intervalo);
                }
            }, 1000);
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function alternarModo() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') body.removeAttribute('data-theme');
            else body.setAttribute('data-theme', 'light');
            desenharRoleta();
        }

        // Inicialização
        atualizarJogadores();
        atualizarSeletores();
        desenharRoleta();
    </script>
</body>
</html>
