    <script>
        let jogadoresLocais = [];
        let jugadorAtualIndex = 0;
        let estaGirando = false;
        let anguloAtual = 0;
        let usuarioLogado = null;
        let eventoAtivoChave = "";
        let salaOnlineCriada = false;
        let cronometroInterval = null;

        let desafios = [
            { texto: "Equilibrar num pé só", dif: "Fácil" },
            { texto: "Ficar estátua por 20s", dif: "Fácil" },
            { texto: "Imitar um macaco", dif: "Médio" },
            { texto: "Pagar 10 flexões", dif: "Difícil" }
        ];
        let filtrosAtivos = { "Fácil": true, "Médio": true, "Difícil": true };

        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');

        window.addEventListener('load', () => {
            let logadoSalvo = localStorage.getItem('roleta_logado');
            if(logadoSalvo) {
                usuarioLogado = JSON.parse(logadoSalvo);
                sanitizarContaFaltante(usuarioLogado);
                document.body.setAttribute('data-theme', usuarioLogado.temaAtivo || 'default');
            } else {
                if(!localStorage.getItem('roleta_visitado_antes')) {
                    document.getElementById('modalTutorial').style.display = 'flex';
                    localStorage.setItem('roleta_visitado_antes', 'true');
                }
            }
            
            let jogSalvos = localStorage.getItem('roleta_jogadores_locais');
            if(jogSalvos) jogadoresLocais = JSON.parse(jogSalvos);

            checarCalendarioSazonal();
            atualizarInterfaceLogado();
            atualizarJogadores();
            atualizarSeletores();
            desenharRoleta();
            atualizarDisplayTempo();
        });

        function sanitizarContaFaltante(userObj) {
            let alterou = false;
            if(!userObj.id) { userObj.id = "#" + Math.floor(1000000 + Math.random() * 9000000).toString(); alterou = true; }
            if(userObj.nivel === undefined || userObj.nivel === null) { userObj.nivel = 1; alterou = true; }
            if(userObj.xp === undefined || userObj.xp === null) { userObj.xp = 0; alterou = true; }
            if(userObj.xpDiario === undefined || userObj.xpDiario === null) { userObj.xpDiario = 0; alterou = true; }
            if(!userObj.codigoSala) { userObj.codigoSala = Math.floor(100000 + Math.random() * 900000).toString(); alterou = true; }
            if(!userObj.amigos) { userObj.amigos = []; alterou = true; }
            if(!userObj.roletasSalvas) { userObj.roletasSalvas = []; alterou = true; }
            if(alterou) { salvarUsuarioNoBanco(userObj); }
        }

        function checarCalendarioSazonal() {
            const agora = new Date(); const dia = agora.getDate(); const mes = agora.getMonth() + 1;
            if (mes === 6 && dia >= 15) eventoAtivoChave = "sao-joao";
            else if (mes === 12 || (mes === 1 && dia <= 5)) eventoAtivoChave = "ano-novo";
            
            if (eventoAtivoChave) {
                document.getElementById('bannerSazonal').style.display = "block";
                document.getElementById('btnSazonalToggle').style.display = "block";
            }
        }

        function alternarSazonalidade() {
            let ativo = document.body.getAttribute('data-sazonal') === 'true';
            if(ativo) {
                document.body.removeAttribute('data-sazonal');
                document.body.removeAttribute('data-event');
            } else {
                document.body.setAttribute('data-sazonal', 'true');
                document.body.setAttribute('data-event', eventoAtivoChave);
            }
            desenharRoleta();
        }

        function alternarModo() {
            let m = document.body.getAttribute('data-theme');
            let novo = m === 'light' ? 'default' : 'light';
            document.body.setAttribute('data-theme', novo);
            if(usuarioLogado) { usuarioLogado.temaAtivo = novo; salvarUsuarioNoBanco(usuarioLogado); }
            desenharRoleta();
        }

        function fecharTutorial() { document.getElementById('modalTutorial').style.display = 'none'; }

        function obterContas() { return JSON.parse(localStorage.getItem('roleta_contas')) || []; }
        function salvarUsuarioNoBanco(userObj) {
            let contas = obterContas();
            let idx = contas.findIndex(c => c.user === userObj.user);
            if(idx !== -1) contas[idx] = userObj;
            localStorage.setItem('roleta_contas', JSON.stringify(contas));
            if(usuarioLogado && usuarioLogado.user === userObj.user) {
                usuarioLogado = userObj;
                localStorage.setItem('roleta_logado', JSON.stringify(userObj));
            }
        }

        function abrirModalAuth() { document.getElementById('modalAuth').style.display = 'flex'; }
        function fecharModalAuth() { document.getElementById('modalAuth').style.display = 'none'; }
        function mudarAbaAuth(tipo) {
            document.getElementById('abaLogin').classList.toggle('ativa', tipo==='login');
            document.getElementById('abaCadastro').classList.toggle('ativa', tipo==='cadastro');
            document.getElementById('formLogin').classList.toggle('ativo', tipo==='login');
            document.getElementById('formCadastro').classList.toggle('ativo', tipo==='cadastro');
        }

        function executarCadastro(e) {
            e.preventDefault();
            let user = document.getElementById('cadUser').value.trim().toLowerCase();
            let email = document.getElementById('cadEmail').value.trim();
            let contas = obterContas();

            if(contas.some(c => c.user === user || c.email === email)) { alert("Dados indisponíveis!"); return; }

            let geradoID = "#" + Math.floor(1000000 + Math.random() * 9000000).toString();
            let novoUser = {
                id: geradoID, nome: document.getElementById('cadNome').value.trim(), user, email,
                senha: document.getElementById('cadSenha').value, emoji: "👑", fundoAvatar: "#4facfe",
                nivel: 1, xp: 0, xpDiario: 0, temaAtivo: "default", 
                codigoSala: Math.floor(100000 + Math.random() * 900000).toString(), amigos: [], roletasSalvas: []
            };

            contas.push(novoUser);
            localStorage.setItem('roleta_contas', JSON.stringify(contas));
            
            usuarioLogado = novoUser;
            localStorage.setItem('roleta_logado', JSON.stringify(novoUser));
            fecharModalAuth();
            atualizarInterfaceLogado();
            atualizarJogadores();
        }

        function executarLogin(e) {
            e.preventDefault();
            let inp = document.getElementById('loginUser').value.trim().toLowerCase();
            let pass = document.getElementById('loginSenha').value;
            let conta = obterContas().find(c => (c.user === inp || c.email === inp) && c.senha === pass);

            if(!conta) { alert("Incorreto!"); return; }
            usuarioLogado = conta;
            sanitizarContaFaltante(usuarioLogado);
            localStorage.setItem('roleta_logado', JSON.stringify(usuarioLogado));
            document.body.setAttribute('data-theme', usuarioLogado.temaAtivo || 'default');
            fecharModalAuth();
            atualizarInterfaceLogado();
            atualizarJogadores();
        }

        function executarLogout() {
            usuarioLogado = null;
            localStorage.removeItem('roleta_logado');
            document.body.removeAttribute('data-theme');
            salaOnlineCriada = false;
            atualizarInterfaceLogado();
            atualizarJogadores();
        }

        function atualizarInterfaceLogado() {
            let pBox = document.getElementById('perfilLogadoBox');
            let btnAuth = document.getElementById('btnAuthHeader');
            let btnOut = document.getElementById('btnLogoutHeader');
            let btnCriar = document.getElementById('btnCriarSala');
            let divSalvar = document.getElementById('secaoSalvarRoleta');

            if(usuarioLogado) {
                sanitizarContaFaltante(usuarioLogado);
                pBox.style.display = 'block';
                btnAuth.style.display = 'none';
                btnOut.style.display = 'block';
                btnCriar.style.display = 'block';
                divSalvar.style.display = 'block';

                document.getElementById('perfAvatar').innerText = usuarioLogado.emoji;
                document.getElementById('perfAvatar').style.background = usuarioLogado.fundoAvatar || "#4facfe";
                document.getElementById('perfNome').innerText = usuarioLogado.nome;
                document.getElementById('perfID').innerText = usuarioLogado.id;
                document.getElementById('perfNivel').innerText = `Nível ${usuarioLogado.nivel}`;

                let max = 50 + (usuarioLogado.nivel - 1) * 25;
                document.getElementById('perfXpTexto').innerText = `XP: ${usuarioLogado.xp}/${max}`;
                document.getElementById('perfXpLimite').innerText = `${usuarioLogado.xpDiario || 0}/25 Diário`;
                document.getElementById('perfBarraProgresso').style.width = `${(usuarioLogado.xp / max) * 100}%`;

                renderizarSlotsRoleta();
            } else {
                pBox.style.display = 'none';
                btnAuth.style.display = 'block';
                btnOut.style.display = 'none';
                btnCriar.style.display = 'none';
                divSalvar.style.display = 'none';
            }
        }

        function abrirModalEdicaoPerfil() { if(!usuarioLogado) return; mudarAbaPerfil('editar'); document.getElementById('modalEdicaoPerfil').style.display = 'flex'; }
        function fecharModalEdicaoPerfil() { document.getElementById('modalEdicaoPerfil').style.display = 'none'; }
        
        function mudarAbaPerfil(aba) {
            document.getElementById('abaA').classList.toggle('ativa', aba==='editar');
            document.getElementById('abaB').classList.toggle('ativa', aba==='amigos');
            document.getElementById('subPerfilEditar').style.display = aba==='editar' ? 'flex' : 'none';
            document.getElementById('subPerfilAmigos').style.display = aba==='amigos' ? 'flex' : 'none';

            if(aba === 'editar') {
                sanitizarContaFaltante(usuarioLogado);
                document.getElementById('editEmoji').value = usuarioLogado.emoji;
                document.getElementById('editFundoAvatar').value = usuarioLogado.fundoAvatar || "#4facfe";
                document.getElementById('lblCodigoSala').innerText = usuarioLogado.codigoSala || "------";
                let nv = usuarioLogado.nivel;
                document.getElementById('editTemasItens').innerHTML = `
                    <div class="item-badge ${usuarioLogado.temaAtivo==='default'?'ativo':''}" onclick="mudarTemaPerfil('default')">Padrão Escuro</div>
                    <div class="item-badge ${usuarioLogado.temaAtivo==='light'?'ativo':''}" onclick="mudarTemaPerfil('light')">Modo Claro</div>
                    <div class="item-badge ${nv < 3 ? 'bloqueado':''} ${usuarioLogado.temaAtivo==='roxo-preto'?'ativo':''}" onclick="mudarTemaPerfil('roxo-preto')">🟣 Roxo (Nv.3)</div>
                    <div class="item-badge ${nv < 7 ? 'bloqueado':''} ${usuarioLogado.temaAtivo==='rosa-preto'?'ativo':''}" onclick="mudarTemaPerfil('rosa-preto')">🌸 Rosa (Nv.7)</div>
                    <div class="item-badge ${nv < 11 ? 'bloqueado':''} ${usuarioLogado.temaAtivo==='azul-preto'?'ativo':''}" onclick="mudarTemaPerfil('azul-preto')">🔷 Azul (Nv.11)</div>
                `;
            } else { atualizarListaAmigos(); }
        }

        function salvarEdicaoPerfil() {
            usuarioLogado.emoji = document.getElementById('editEmoji').value;
            usuarioLogado.fundoAvatar = document.getElementById('editFundoAvatar').value;
            salvarUsuarioNoBanco(usuarioLogado);
            atualizarInterfaceLogado();
            atualizarJogadores();
        }

        function mudarTemaPerfil(tema) {
            sanitizarContaFaltante(usuarioLogado);
            if(tema === 'roxo-preto' && usuarioLogado.nivel < 3) return;
            if(tema === 'rosa-preto' && usuarioLogado.nivel < 7) return;
            if(tema === 'azul-preto' && usuarioLogado.nivel < 11) return;
            usuarioLogado.temaAtivo = tema;
            document.body.setAttribute('data-theme', tema);
            salvarEdicaoPerfil();
            mudarAbaPerfil('editar');
            desenharRoleta();
        }

        function buscarEAdicionarAmigo() {
            let busca = document.getElementById('txtBuscaAmigo').value.trim();
            if(!busca) return;
            if(!usuarioLogado.amigos) usuarioLogado.amigos = [];
            if(usuarioLogado.amigos.length >= 30) { alert("Limite de 30 amigos alcançado!"); return; }

            let contas = obterContas();
            // Correção da busca: aceita com ou sem a hashtag '#' no ID
            let encontrado = contas.find(c => c.user === busca.toLowerCase() || c.id === busca || c.id === "#" + busca);

            if(!encontrado) { alert("Usuário ou ID não localizado no banco de dados local!"); return; }
            if(encontrado.user === usuarioLogado.user) { alert("Não pode adicionar você mesmo!"); return; }
            if(usuarioLogado.amigos.some(a => a.user === encontrado.user)) { alert("Este amigo já está na sua lista!"); return; }

            usuarioLogado.amigos.push({ nome: encontrado.nome, user: encontrado.user, id: encontrado.id, emoji: encontrado.emoji });
            salvarUsuarioNoBanco(usuarioLogado);
            document.getElementById('txtBuscaAmigo').value = '';
            atualizarListaAmigos();
            alert("Amigo adicionado com sucesso!");
        }

        function atualizarListaAmigos() {
            let lista = usuarioLogado.amigos || [];
            document.getElementById('lblQtdAmigos').innerText = lista.length;
            let container = document.getElementById('listaAmigosBox');
            container.innerHTML = '';
            lista.forEach(a => {
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px; font-size:12px;">
                        <span>${a.emoji} <strong>${a.nome}</strong> (${a.id})</span>
                        <button class="btn-acao" style="padding:2px 6px; font-size:10px; background:#ff4a4a;" onclick="removerAmigo('${a.user}')">Remover</button>
                    </div>`;
            });
        }

        function removerAmigo(user) { usuarioLogado.amigos = usuarioLogado.amigos.filter(a => a.user !== user); salvarUsuarioNoBanco(usuarioLogado); atualizarListaAmigos(); }

        function renderizarSlotsRoleta() {
            let container = document.getElementById('containerSlotsRoleta');
            container.innerHTML = '';
            let nv = usuarioLogado.nivel || 1;

            for(let i = 1; i <= 2; i++) {
                let jaTem = usuarioLogado.roletasSalvas && usuarioLogado.roletasSalvas[i - 1];
                let lbl = jaTem ? `Carregar Rlt ${i}` : `Salvar Slot ${i} (Grátis)`;
                container.innerHTML += `<button class="btn-header" style="font-size:11px; padding:4px 8px; border-color:#2ecc71;" onclick="acaoSlotRoleta(${i - 1})">💾 ${lbl}</button>`;
            }

            let slotIndexGlobal = 2;
            for(let i = 5; i <= 30; i += 5) {
                if(nv >= i) {
                    let jaTem = usuarioLogado.roletasSalvas && usuarioLogado.roletasSalvas[slotIndexGlobal];
                    let lbl = jaTem ? `Carregar Rlt ${slotIndexGlobal + 1}` : `Salvar Slot ${slotIndexGlobal + 1}`;
                    container.innerHTML += `<button class="btn-header" style="font-size:11px; padding:4px 8px; border-color:var(--primaria);" onclick="acaoSlotRoleta(${slotIndexGlobal})">💾 ${lbl}</button>`;
                } else {
                    container.innerHTML += `<span class="item-badge bloqueado" style="font-size:10px;">🔒 Nv.${i}</span>`;
                }
                slotIndexGlobal++;
            }
        }

        function acaoSlotRoleta(idx) {
            if(!usuarioLogado.roletasSalvas) usuarioLogado.roletasSalvas = [];
            if(usuarioLogado.roletasSalvas[idx]) {
                desafios = usuarioLogado.roletasSalvas[idx];
                atualizarSeletores();
                desenharRoleta();
                alert("Roleta carregada com sucesso!");
            } else {
                usuarioLogado.roletasSalvas[idx] = JSON.parse(JSON.stringify(desafios));
                salvarUsuarioNoBanco(usuarioLogado);
                renderizarSlotsRoleta();
                alert("Layout da roleta salvo neste slot!");
            }
        }

        function criarSalaOnline() { salaOnlineCriada = true; atualizarJogadores(); alert(`Sala Online Ativa! Código: ${usuarioLogado.codigoSala}`); }
        
        function entrarPorCodigo() {
            let cod = document.getElementById('codigoConviteInput').value.trim();
            if(cod.length !== 6) { alert("O código precisa ter exatamente 6 dígitos."); return; }
            
            let sala = obterContas().find(c => c.codigoSala === cod);
            if(!sala) { alert("Sala não localizada! Certifique-se de que o líder criou a conta neste navegador."); return; }
            
            // Impede entrar na própria sala
            if(usuarioLogado && sala.user === usuarioLogado.user) { alert("Você já é o dono desta sala!"); return; }
            
            // Impede duplicar o mesmo jogador na lista
            if(jogadoresLocais.some(j => j.nome === sala.nome)) { alert("Este jogador já está na sala!"); return; }

            jogadoresLocais.push({ nome: sala.nome, avatar: sala.emoji, bg: sala.fundoAvatar, pontos: 0 });
            localStorage.setItem('roleta_jogadores_locais', JSON.stringify(jogadoresLocais));
            document.getElementById('codigoConviteInput').value = '';
            atualizarJogadores();
            alert(`Você entrou na sala de ${sala.nome}!`);
        }

        function removerJogadorLocal(index) {
            // Remove o jogador com base no índice da array local
            jogadoresLocais.splice(index, 1);
            localStorage.setItem('roleta_jogadores_locais', JSON.stringify(jogadoresLocais));
            
            // Reajusta o ponteiro do turno para não quebrar o jogo
            if (jugadorAtualIndex >= obterListaTotalJogadores().length) {
                jugadorAtualIndex = 0;
            }
            atualizarJogadores();
        }

        function obterListaTotalJogadores() {
            let lista = [];
            if(usuarioLogado) {
                let sufixo = salaOnlineCriada ? " 👑 (Líder)" : " (Você)";
                lista.push({ nome: usuarioLogado.nome + sufixo, avatar: usuarioLogado.emoji, bg: usuarioLogado.fundoAvatar, pontos: usuarioLogado.pontos || 0, lider: salaOnlineCriada, principal: true });
            }
            jogadoresLocais.forEach((j, idx) => {
                lista.push({ ...j, indexLocal: idx, principal: false });
            });
            return lista;
        }

        function atualizarJogadores() {
            let container = document.getElementById('listaJogadoresContainer');
            container.innerHTML = '';
            let listaCompleta = obterListaTotalJogadores();
            
            listaCompleta.forEach((j, idx) => {
                let ativo = idx === jugadorAtualIndex ? 'ativo' : '';
                let liderCls = j.lider ? 'lider' : '';
                
                // Criação dinâmica do botão de remover apenas para convidados
                let botaoRemover = !j.principal 
                    ? `<button onclick="removerJogadorLocal(${j.indexLocal})" style="background: rgba(255,42,95,0.2); border: 1px solid #ff2a5f; color: #ff2a5f; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 10px;">✕</button>` 
                    : '';

                container.innerHTML += `
                    <div class="jogador-item ${ativo} ${liderCls}">
                        <div class="avatar-preview" style="background:${j.bg || 'rgba(255,255,255,0.1)'}">${j.avatar}</div>
                        <div class="jogador-info">
                            <span>${j.nome}</span>
                            <div style="display: flex; align-items: center;">
                                <span><strong>${j.pontos || 0} pts</strong></span>
                                ${botaoRemover}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function adicionarJogador() {
            let inp = document.getElementById('nome-jogador'); if(!inp.value.trim()) return;
            jogadoresLocais.push({ nome: inp.value.trim(), avatar: document.getElementById('emoji-jogador').value, bg: 'rgba(255,255,255,0.1)', pontos: 0 });
            inp.value = ''; localStorage.setItem('roleta_jogadores_locais', JSON.stringify(jogadoresLocais));
            atualizarJogadores();
        }

        function obterDesafiosFiltrados() { return desafios.filter(d => filtrosAtivos[d.dif]); }

        document.getElementById('girosInput').addEventListener('input', function() {
            let val = parseInt(this.value);
            if(isNaN(val) || val < 1) this.value = 1;
        });

        function desenharRoleta() {
            let lista = obterDesafiosFiltrados();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(lista.length === 0) return;

            let tamAng = (2 * Math.PI) / lista.length;
            let rStyle = getComputedStyle(document.documentElement);

            lista.forEach((d, i) => {
                let bg = "";
                if(d.dif === 'Fácil') bg = rStyle.getPropertyValue('--cor-facil').trim() || "#00f2fe";
                else if(d.dif === 'Médio') bg = rStyle.getPropertyValue('--cor-medio').trim() || "#ffcc00";
                else bg = rStyle.getPropertyValue('--cor-dificil').trim() || "#ff2a5f";

                let txtColor = (d.dif === 'Difícil' && (bg === '#121420' || bg.toLowerCase() === 'preto')) ? '#ffffff' : '#121420';

                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamAng, (i + 1) * tamAng);
                ctx.fillStyle = bg; ctx.fill(); ctx.stroke();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * tamAng + tamAng/2);
                ctx.textAlign = "right"; ctx.fillStyle = txtColor; ctx.font = "bold 13px sans-serif";
                ctx.fillText(d.texto.substring(0, 16), 210, 5); ctx.restore();
            });
        }

        function girarRoleta() {
            if(estaGirando) return;
            
            let gInput = document.getElementById('girosInput');
            let girosRestantes = parseInt(gInput.value) || 0;
            if(girosRestantes <= 0) { alert("Você não possui mais giros disponíveis!"); return; }

            let lista = obterDesafiosFiltrados(); if(lista.length === 0) return;
            estaGirando = true;
            
            gInput.value = girosRestantes - 1;
            clearInterval(cronometroInterval); 

            let voltas = 6 + Math.floor(Math.random() * 5); let graus = Math.floor(Math.random() * 360);
            anguloAtual += (voltas * 360) + graus;
            canvas.style.transform = `rotate(${anguloAtual}deg)`;

            setTimeout(() => {
                estaGirando = false;
                let grFin = (360 - (anguloAtual % 360) + 270) % 360;
                let idx = Math.floor(grFin / (360 / lista.length)) % lista.length;
                let desafioSorteado = lista[idx];

                if(usuarioLogado && (usuarioLogado.xpDiario || 0) < 25 && (usuarioLogado.nivel || 1) < 30) {
                    usuarioLogado.xp = (usuarioLogado.xp || 0) + 1; 
                    usuarioLogado.xpDiario = (usuarioLogado.xpDiario || 0) + 1;
                    let max = 50 + ((usuarioLogado.nivel || 1) - 1) * 25;
                    if(usuarioLogado.xp >= max) { usuarioLogado.xp = 0; usuarioLogado.nivel = (usuarioLogado.nivel || 1) + 1; }
                    salvarUsuarioNoBanco(usuarioLogado);
                    atualizarInterfaceLogado();
                }

                document.getElementById('desafioAtualTexto').innerText = `Missão: "${desafioSorteado.texto}" [${desafioSorteado.dif}]`;
                document.getElementById('painelValidacao').style.display = 'flex';
                
                if(document.getElementById('ativarTempo').checked) iniciarCronometroRegressivo();
            }, 3500);
        }

        function iniciarCronometroRegressivo() {
            let tempoRestante = parseInt(document.getElementById('tempoInput').value) || 30;
            
            function formatarTempo(s) {
                let min = Math.floor(s / 60);
                let seg = s % 60;
                return `${min < 10 ? '0'+min : min}:${seg < 10 ? '0'+seg : seg}`;
            }

            document.getElementById('cronometro').innerText = formatarTempo(tempoRestante);
            
            cronometroInterval = setInterval(() => {
                tempoRestante--;
                if(tempoRestante <= 0) {
                    clearInterval(cronometroInterval);
                    document.getElementById('cronometro').innerText = "00:00";
                    document.getElementById('historico').innerText = "💥 O tempo acabou para o desafio atual!";
                } else {
                    document.getElementById('cronometro').innerText = formatarTempo(tempoRestante);
                }
            }, 1000);
        }

        function validarResultado(cumpriu) {
            clearInterval(cronometroInterval);
            document.getElementById('painelValidacao').style.display = 'none';
            let listaCompleta = obterListaTotalJogadores();
            if(listaCompleta.length > 0) {
                let j = listaCompleta[jugadorAtualIndex];
                
                if(cumpriu) {
                    if (usuarioLogado && jugadorAtualIndex === 0) {
                        usuarioLogado.pontos = (usuarioLogado.pontos || 0) + 10;
                        salvarUsuarioNoBanco(usuarioLogado);
                    } else {
                        let idxLocal = usuarioLogado ? jugadorAtualIndex - 1 : jugadorAtualIndex;
                        if(jogadoresLocais[idxLocal]) jogadoresLocais[idxLocal].pontos = (jogadoresLocais[idxLocal].pontos || 0) + 10;
                    }
                }

                document.getElementById('historico').innerText = cumpriu ? `${j.nome} completou e ganhou 10 pts!` : `${j.nome} não cumpriu.`;
                jugadorAtualIndex = (jugadorAtualIndex + 1) % listaCompleta.length;
                
                localStorage.setItem('roleta_jogadores_locais', JSON.stringify(jogadoresLocais));
                atualizarJogadores();
                atualizarDisplayTempo();
            }
        }

        function atualizarDisplayTempo() { 
            let t = parseInt(document.getElementById('tempoInput').value) || 30; 
            let min = Math.floor(t / 60);
            let seg = t % 60;
            document.getElementById('cronometro').innerText = `${min < 10 ? '0'+min : min}:${seg < 10 ? '0'+seg : seg}`; 
        }
        
        function mudarFiltro(d) { filtrosAtivos[d] = !filtrosAtivos[d]; document.getElementById(`filtro-${d.toLowerCase()}`).classList.toggle('ativo', filtrosAtivos[d]); desenharRoleta(); }
        
        function atualizarCoresCustomizadas() {
            let root = document.documentElement;
            root.style.setProperty('--cor-facil', document.getElementById('corFundoFacil').value);
            root.style.setProperty('--cor-medio', document.getElementById('corFundoMedio').value);
            root.style.setProperty('--cor-dificil', document.getElementById('corFundoDificil').value);
            desenharRoleta();
        }
        function adicionarDesafio() { desafios.push({ texto: document.getElementById('texto-desafio').value, dif: document.getElementById('dificuldade-desafio').value }); atualizarSeletores(); desenharRoleta(); }
        function atualizarSeletores() { let s = document.getElementById('seletor-remover'); s.innerHTML=''; desafios.forEach((d,i)=>s.innerHTML+=`<option value="${i}">${d.texto}</option>`); }
        function removerDesafio() { desafios.splice(document.getElementById('seletor-remover').value,1); atualizarSeletores(); desenharRoleta(); }
    </script>
