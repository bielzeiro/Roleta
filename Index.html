<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Desafios Pro</title>
    <style>
        :root {
            --bg-principal: #121420;
            --bg-painel: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --texto: #f0f2f5;
            --primaria: #00f2fe;
            --secundaria: #4facfe;
            --botao-girar: #ff2a5f;
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f9;
            --bg-painel: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --texto: #1a1d24;
            --primaria: #0072ff;
            --secundaria: #00c6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Topo / Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .creditos h1 {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 400;
        }

        .creditos strong {
            color: var(--primaria);
        }

        .header-controles {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-header {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-header:hover {
            border-color: var(--primaria);
        }

        /* Container Principal do Layout Desenhado */
        .dashboard {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Coluna de Configurações e Jogadores (Esquerda) */
        .painel-lateral {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
            max-width: 400px;
        }

        .card {
            background: var(--bg-painel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        .card-titulo {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primaria);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid de Opções */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-grupo {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-grupo label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        select, input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--texto);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--primaria);
        }

        /* Área de Jogadores / Avatares */
        .lista-jogadores {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .jogador-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .jogador-item.ativo {
            border-color: var(--primaria);
            background: rgba(0, 242, 254, 0.05);
        }

        .avatar-preview {
            width: 36px;
            height: 36px;
            background: var(--secundaria);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .jogador-info {
            flex: 1;
        }

        .jogador-nome {
            font-size: 13px;
            font-weight: 600;
        }

        .jogador-pontos {
            font-size: 11px;
            opacity: 0.6;
        }

        /* Coluna Central da Roleta */
        .area-roleta {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 20px;
        }

        .cronometro-container {
            font-size: 32px;
            font-weight: 700;
            background: var(--bg-painel);
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            letter-spacing: 1px;
            color: var(--primaria);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .roleta-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marcador-topo {
            position: absolute;
            top: -10px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--botao-girar);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-centro-girar {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--botao-girar);
            border: 4px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Lista de Desafios e Histórico */
        .gerenciador-desafios {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-add-grupo {
            display: flex;
            gap: 8px;
        }

        .input-add-grupo input {
            flex: 1;
        }

        .btn-acao {
            background: var(--primaria);
            color: #121420;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-acao.apagar {
            background: #ff4a4a;
            color: white;
        }

        .historico-caixa {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.8;
        }

        /* Layout responsivo para telas verticais (Telemóvel em pé) */
        @media (max-width: 900px) {
            .dashboard {
                flex-direction: column;
            }
            .painel-lateral {
                max-width: 100%;
                min-width: 100%;
            }
            .area-roleta {
                padding: 40px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="creditos">
            <h1>Criado por <strong>bielzeiro</strong> & <strong>Gemini AI</strong></h1>
        </div>
        <div class="header-controles">
            <button class="btn-header" onclick="alternarModo()">🌓 Modo</button>
            <button class="btn-header" style="border-color: var(--primaria);">👤 Login Opcional</button>
        </div>
    </header>

    <main class="dashboard">
        
        <section class="painel-lateral">
            
            <div class="card">
                <div class="card-titulo">⚙️ Painel de Controlo</div>
                <div class="config-grid">
                    <div class="input-grupo">
                        <label>Filtro Dificuldade</label>
                        <select id="filtro-dificuldade">
                            <option value="suave">Suave 🟢</option>
                            <option value="moderado">Moderado 🟡</option>
                            <option value="hardcore">Hardcore 🔴</option>
                        </select>
                    </div>
                    <div class="input-grupo">
                        <label>Tempo de Jogo</label>
                        <input type="number" id="tempo-input" value="30" min="5">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-titulo">👥 Ordem dos Jogadores</div>
                <div class="lista-jogadores" id="lista-jogadores">
                    <div class="jogador-item ativo">
                        <div class="avatar-preview">👑</div>
                        <div class="jogador-info">
                            <div class="jogador-nome">Bielzeiro</div>
                            <div class="jogador-pontos">0 pts</div>
                        </div>
                    </div>
                    <div class="jogador-item">
                        <div class="avatar-preview">🦊</div>
                        <div class="jogador-info">
                            <div class="jogador-nome">Jogador 2</div>
                            <div class="jogador-pontos">0 pts</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-titulo">📝 Customizar Fatias</div>
                <div class="gerenciador-desafios">
                    <div class="input-add-grupo">
                        <input type="text" id="novo-desafio" placeholder="Digitar novo desafio...">
                        <button class="btn-acao">Add</button>
                    </div>
                    <div class="input-add-grupo">
                        <select id="seletor-desafios" style="flex: 1;">
                            <option>Equilibrar num Pé</option>
                            <option>Ficar Estátua 20s</option>
                        </select>
                        <button class="btn-acao apagar">Apagar</button>
                    </div>
                </div>
            </div>

        </section>

        <section class="area-roleta">
            
            <div class="cronometro-container" id="cronometro">
                00:30
            </div>

            <div class="roleta-wrapper">
                <div class="marcador-topo"></div>
                <canvas id="roletaCanvas" width="500" height="500"></canvas>
                <button class="btn-centro-girar" id="btnGirar">Girar</button>
            </div>

            <div class="card" style="width: 100%; max-width: 500px;">
                <div class="card-titulo" style="margin-bottom: 8px; font-size: 13px;">📜 Histórico da Partida</div>
                <div class="historico-caixa" id="historico">
                    Jogo iniciado com layout limpo! Prontos para rodar.
                </div>
            </div>

        </section>

    </main>

    <script>
        // Lógica visual básica para renderizar a roleta inicial e alternar os modos
        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');
        
        function desenharRoletaInicial() {
            const fatias = ["Equilibrar num Pé", "Ficar Estátua 20s", "Imitar um Macaco", "Contar uma Piada"];
            const cores = ["#00f2fe", "#ff2a5f", "#4facfe", "#ffcc00"];
            const tamanhoAngulo = (2 * Math.PI) / fatias.length;

            for (let i = 0; i < fatias.length; i++) {
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamanhoAngulo, (i + 1) * tamanhoAngulo);
                ctx.fillStyle = cores[i];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Desenhar Texto Rotacionado Nativamente
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(i * tamanhoAngulo + tamanhoAngulo / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(fatias[i], 220, 5);
                ctx.restore();
            }
        }

        function alternarModo() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
            desenharRoletaInicial();
        }

        // Desenhar assim que abre a página
        desenharRoletaInicial();
    </script>
</body>
</html>
