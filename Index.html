<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Desafios Ultra Pro v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-principal: #121420;
            --bg-painel: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --texto: #f0f2f5;
            --primaria: #00f2fe;
            --secundaria: #4facfe;
            --botao-girar: #ff2a5f;
            
            /* Cores padrão da Roleta */
            --roleta-fundo-1: #1a1d2d;
            --roleta-fundo-2: #24293e;
            --roleta-texto: #ffffff;
            --roleta-borda: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f9;
            --bg-painel: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --texto: #1a1d24;
            --primaria: #0072ff;
            --secundaria: #00c6ff;
            --roleta-fundo-1: #ffffff;
            --roleta-fundo-2: #e4e8f0;
            --roleta-texto: #1a1d24;
            --roleta-borda: rgba(0, 0, 0, 0.1);
        }

        /* Temas aplicados à Roleta e Elementos de Destaque */
        [data-roleta-theme="verde-neon"] {
            --roleta-fundo-1: #0d2419; --roleta-fundo-2: #143525; --roleta-texto: #39ff14; --roleta-borda: #39ff14;
        }
        [data-roleta-theme="azul-nv8"] {
            --roleta-fundo-1: #0a2145; --roleta-fundo-2: #103166; --roleta-texto: #0095ff; --roleta-borda: #0095ff;
        }
        [data-roleta-theme="rosa-nv13"] {
            --roleta-fundo-1: #2e0b20; --roleta-fundo-2: #42122e; --roleta-texto: #ff0080; --roleta-borda: #ff0080;
        }
        [data-roleta-theme="verde-nv21"] {
            --roleta-fundo-1: #0b2e1c; --roleta-fundo-2: #124229; --roleta-texto: #00e673; --roleta-borda: #00e673;
        }
        [data-roleta-theme="roxo-nv26"] {
            --roleta-fundo-1: #220b3d; --roleta-fundo-2: #321257; --roleta-texto: #9933ff; --roleta-borda: #9933ff;
        }
        [data-roleta-theme="dourado-nv30"] {
            --roleta-fundo-1: #2d240a; --roleta-fundo-2: #423511; --roleta-texto: #d4af37; --roleta-borda: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-principal); color: var(--texto); min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.2); position: relative; z-index: 10; }
        .header-controles { display: flex; gap: 12px; align-items: center; }
        
        .btn-header { background: var(--bg-painel); border: 1px solid var(--border-color); color: var(--texto); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .btn-header:hover { border-color: var(--primaria); }

        /* Estilo do Titulo em Degradê Roxo */
        .titulo-roleta-container { width: 100%; text-align: center; padding-top: 20px; position: relative; z-index: 10; }
        .titulo-roleta { font-size: 42px; font-weight: bold; font-family: 'Georgia', serif; background: linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px rgba(168, 85, 247, 0.3)); margin-bottom: 5px; }
        .subtitulo-sazonal { font-size: 20px; font-weight: bold; font-family: 'Segoe UI', sans-serif; }

        /* Animações de Degradê em Movimento */
        .titulo-lgbt-movimento {
            font-size: 42px; font-weight: bold; font-family: 'Georgia', serif;
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #004CFF, #732982);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradienteMovimento 8s ease infinite;
        }
        .titulo-brasil-movimento {
            font-size: 42px; font-weight: bold; font-family: 'Georgia', serif;
            background: linear-gradient(90deg, #0c7016, #ffff00, #233dff, #0c7016);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradienteMovimento 6s ease infinite;
        }
        .titulo-natal-movimento {
            font-size: 42px; font-weight: bold; font-family: 'Georgia', serif;
            background: linear-gradient(90deg, #FFFFFF, #e90808, #FFFFFF);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradienteMovimento 5s ease infinite;
        }
        @keyframes gradienteMovimento {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efeitos Especiais de Background Sazonal */
        .emoji-central-bg-lgbt {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 25vw; opacity: 0.15; pointer-events: none; z-index: 0; display: none;
        }
        
        /* Corações saindo de trás da bandeira */
        .container-coracoes-circulo {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1px; height: 1px; z-index: 0; pointer-events: none; display: none;
        }
        .coracao-radial {
            position: absolute; font-size: 24px; pointer-events: none; opacity: 0;
            animation: explosaoCirculo 4s linear infinite;
        }
        @keyframes explosaoCirculo {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translate(var(--x), var(--y)) scale(1.2); opacity: 0; }
        }

        .dashboard { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 25px; max-width: 1100px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
        .area-roleta { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .cronometro-caixa-interna { font-size: 42px; font-weight: 800; color: var(--primaria); font-family: monospace; letter-spacing: 1px; text-align: center; margin: 5px 0; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 5px; border: 1px solid var(--border-color); }

        .painel-controle-partida { background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .controle-linha { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
        .controle-linha label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .controle-linha input[type="number"] { width: 60px; padding: 4px; text-align: center; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--texto); border-radius: 6px; }
        .controle-linha select { width: auto; padding: 4px 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--texto); border-radius: 6px; }

        .roleta-wrapper { position: relative; width: 100%; max-width: 380px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        .marcador-topo { position: absolute; top: -10px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--botao-girar); z-index: 10; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 4px solid var(--roleta-borda); transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .btn-centro-girar { position: absolute; width: 75px; height: 75px; background: var(--botao-girar); border: 4px solid #fff; border-radius: 50%; color: white; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 12; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .painel-validacao { width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 12px; text-align: center; background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .btn-validar { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-validar.sucesso { background: #2ecc71; color: white; }
        .btn-validar.falha { background: #ff2a5f; color: white; }

        .secao-configuracoes { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .secao-configuracoes { grid-template-columns: 1fr; } }

        .card { background: var(--bg-painel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card-titulo { font-size: 15px; font-weight: 600; color: var(--primaria); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        
        .perfil-mini-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; cursor: pointer; }
        .perfil-mini-box:hover { border-color: var(--primaria); }
        .perfil-topo { display: flex; align-items: center; gap: 12px; }
        .perfil-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--primaria); }
        .perfil-meta { display: flex; flex-direction: column; }
        .perfil-id { font-size: 11px; opacity: 0.6; font-family: monospace; }
        .perfil-nivel-tag { background: var(--primaria); color: #121420; padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: bold; width: fit-content; margin-top: 2px; }
        
        .xp-barra-fundo { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .xp-barra-progresso { background: linear-gradient(90deg, var(--primaria), var(--secundaria)); height: 100%; width: 0%; }

        .lista-jogadores { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .jogador-item { display: flex; align-items: center; gap: 12px; background: rgba(0, 0, 0, 0.2); padding: 8px 12px; border-radius: 10px; border: 1px solid transparent; }
        .jogador-item.ativo { border-color: var(--primaria); background: rgba(0, 242, 254, 0.1); }
        
        .avatar-preview { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .jogador-info { display: flex; justify-content: space-between; width: 100%; font-size: 13px; align-items: center; }

        .botoes-dificuldade { display: flex; gap: 8px; width: 100%; }
        .btn-dif { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--texto); cursor: pointer; font-size: 11px; opacity: 0.4; }
        .btn-dif.ativo { border-color: var(--primaria); background: rgba(0, 242, 254, 0.25); opacity: 1; font-weight: bold; }

        select, input { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); color: var(--texto); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; }
        [data-theme="light"] select, [data-theme="light"] input { background: rgba(255, 255, 255, 0.9); color: #1a1d24; }
        .input-add-grupo { display: flex; gap: 8px; width: 100%; }
        .btn-acao { background: var(--primaria); color: #121420; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }
        [data-theme="light"] .btn-acao { color: #fff; }
        .btn-acao.apagar { background: #ff4a4a; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-card { background: #1a1d24; border: 1px solid var(--border-color); width: 100%; max-width: 420px; border-radius: 16px; padding: 22px; color: #f0f2f5; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-fechar { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; opacity: 0.7; }

        .historico-caixa { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; height: 70px; overflow-y: auto; font-size: 12px; }

        /* Estilos do Botão Sazonal Flutuante Lateral */
        .btn-sazonal-flutuante { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border-color); font-size: 28px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 90; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-sazonal-flutuante:hover { transform: translateY(-50%) scale(1.1); }

        /* Container do Menu Multi-Eventos de Junho */
        .menu-junho-container { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: none; flex-direction: column; gap: 10px; z-index: 90; }
        .btn-junho-opcao { width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-junho-opcao:hover { transform: scale(1.1); }

        /* Animação de Queda Diagonal de Emojis */
        .emoji-sazonal-bg { position: fixed; top: -50px; font-size: 24px; pointer-events: none; opacity: 0.75; z-index: 1; animation: quedaDiagonal 6s linear infinite; }
        @keyframes quedaDiagonal {
            0% { transform: translate(0, 0) rotate(0deg); top: -50px; }
            100% { transform: translate(-300px, 105vh) rotate(360deg); }
        }

        /* Seletor Especial para Conta de Avaliação #1122264 */
        .seletor-teste-container { background: rgba(255, 170, 0, 0.1); border: 1px dashed #ffaa00; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: none; flex-direction: column; gap: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="containerEmojisSazonais"></div>
    <div class="emoji-central-bg-lgbt" id="emojiLgbtCentral">🏳️‍🌈</div>
    <div class="emoji-central-bg-lgbt" id="bandeiraBrasilCentral" style="font-size: 22vw;">🇧🇷</div>
    <div class="container-coracoes-circulo" id="contCoracoesCirculo"></div>

    <button id="btnSazonalFlutuante" class="btn-sazonal-flutuante" onclick="ativarCliqueSazonal()"></button>

    <div class="menu-junho-container" id="menuJunhoCont">
        <button class="btn-junho-opcao" style="background: linear-gradient(45deg, #ff004c, #7900ff);" title="Mês do Orgulho" onclick="forcarSubEventoJunho('jun_orgulho')">🌈</button>
        <button class="btn-junho-opcao" style="background: #ffc2c7;" title="Dia dos Namorados" onclick="forcarSubEventoJunho('jun_namorados')">🏹</button>
        <button class="btn-junho-opcao" style="background: #de0f3f;" title="São João" onclick="forcarSubEventoJunho('jun_saojoao')">🔥</button>
    </div>

    <header>
        <div class="header-controles">
            <button class="btn-header" onclick="alternarModo()">🌓 Modo Base</button>
        </div>
        <div class="header-controles">
            <button class="btn-header" id="btnAuthHeader" onclick="abrirModalAuth()">👤 Login / Cadastro</button>
            <button class="btn-header btn-logout" id="btnLogoutHeader" style="display: none;" onclick="executarLogout()">供 Sair</button>
        </div>
    </header>

    <div class="titulo-roleta-container">
        <h1 class="titulo-roleta" id="txtTituloRoleta">ℛℴ𝓁ℯ𝓉𝒶</h1>
        <div class="subtitulo-sazonal" id="txtSubtituloSazonal"></div>
    </div>

    <main class="dashboard">
        <section class="area-roleta">

            <div class="seletor-teste-container" id="painelTesteAdmin">
                <span style="color:#ffaa00; font-weight:bold;">🛠️ Painel do Avaliador (ID: #1122264)</span>
                <label>Forçar Evento para Teste: 
                    <select id="selectForcarEvento" onchange="forcarEventoManual(this.value)">
                        <option value="">-- Usar Data Atual do Sistema --</option>
                        <option value="desativar">❌ Desativar Evento Atual</option>
                        <option value="set_1_30">Set (1-30) - Independência do Brasil 🇧🇷</option>
                        <option value="out_1_15">Out (1-15) - Dia das Crianças 🧸</option>
                        <option value="out_16_31">Out (16-31) - Halloween 🎃</option>
                        <option value="dez_1_31">Dez (1-31) - Natal 🎄</option>
                        <option value="jan_1_15">Jan (1-15) - Ano Novo</option>
                        <option value="jan_16_31">Jan (16-31) - Festival de Fogos</option>
                        <option value="fev_1_15">Fev (1-15) - Escolar</option>
                        <option value="mar_1_5">Mar (1-5) - Carnaval</option>
                        <option value="mar_6_15">Mar (6-15) - Dia da Mulher</option>
                        <option value="abr_1_30">Abr (1-30) - Páscoa</option>
                        <option value="maio_1_20">Maio (1-20) - Dia das Mães 🌹</option>
                        <option value="jun_orgulho">Junho (1-30) - Orgulho LGBT 🌈</option>
                        <option value="jun_namorados">Junho (1-15) - Namorados 🏹</option>
                        <option value="jun_saojoao">Junho (16-30) - São João 🔥</option>
                        <option value="agosto_pais">Agosto (1-15) - Dia dos Pais 👔</option>
                    </select>
                </label>
            </div>

            <div class="painel-controle-partida">
                <div class="controle-linha">
                    <span style="font-weight: bold; color: var(--primaria);" id="lblPainelControle">⚙️ Painel de Controle de Partida</span>
                </div>
                
                <div class="cronometro-caixa-interna" id="cronometro">00:30</div>

                <div class="controle-linha">
                    <label id="lblTempoS">Tempo (s): <input type="number" id="tempoInput" value="30" min="5" max="300" onchange="atualizarDisplayTempo()"></label>
                    <label id="lblTempAtivo"><input type="checkbox" id="ativarTempo" checked onchange="toggleTemporizadorVisivel()"> Temporizador Ativo</label>
                </div>
                <div class="controle-linha">
                    <label id="lblModoTempo">Modo Tempo: 
                        <select id="modoTempoSelect">
                            <option value="automatico">Automático</option>
                            <option value="manual">Manual</option>
                        </select>
                    </label>
                    <label id="lblMutarSom"><input type="checkbox" id="mutarSomCheck"> Desativar Som</label>
                </div>
                <div class="controle-linha">
                    <label id="lblGiroAuto"><input type="checkbox" id="autoGirarCheck"> Giro Automático contínuo</label>
                    <label id="lblQtdGiros">Qtd Giros: <input type="number" id="girosInput" value="5" min="1"></label>
                </div>
                <div class="controle-linha" style="margin-top: 5px;">
                    <div class="botoes-dificuldade" id="boxFiltrosRapidos">
                        <button class="btn-dif ativo" id="filtro-facil" onclick="mudarFiltro('Fácil')">🟢 Fácil</button>
                        <button class="btn-dif ativo" id="filtro-medio" onclick="mudarFiltro('Médio')">🟡 Médio</button>
                        <button class="btn-dif ativo" id="filtro-dificil" onclick="mudarFiltro('Difícil')">🔴 Difícil</button>
                    </div>
                </div>
            </div>

            <div class="roleta-wrapper">
                <div class="marcador-topo"></div>
                <canvas id="roletaCanvas" width="500" height="500"></canvas>
                <button class="btn-centro-girar" onclick="gridGirarEvent()">Girar</button>
            </div>

            <div class="painel-validacao" id="painelValidacao">
                <div class="desafio-atual-texto" id="desafioAtualTexto" style="font-weight: bold; margin-bottom: 10px;"></div>
                <div class="input-add-grupo">
                    <button class="btn-validar sucesso" id="btnCumpriuAcao" onclick="validarResultado(true)">Cumpriu 👍</button>
                    <button class="btn-validar falha" onclick="validarResultado(false)">Não Cumpriu 👎</button>
                </div>
            </div>

            <div class="card" style="width:100%; max-width:500px;"><div class="historico-caixa" id="historico">Painel iniciado.</div></div>
        </section>

        <section class="secao-configuracoes">
            <div class="card">
                <div class="card-titulo" id="lblJogadoresSala">👥 Jogadores da Sala</div>
                
                <div id="perfilLogadoBox" class="perfil-mini-box" style="display: none;" onclick="abrirModalEdicaoPerfil()">
                    <div class="perfil-topo">
                        <div class="perfil-avatar" id="perfAvatar">👑</div>
                        <div class="perfil-meta">
                            <span class="perfil-nome" id="perfNome">Dono</span>
                            <span class="perfil-id" id="perfID">#0000000</span>
                            <span class="perfil-nivel-tag" id="perfNivel">Nível 1</span>
                        </div>
                    </div>
                    <div class="xp-wrapper" style="margin-top: 8px;">
                        <div style="display:flex; justify-content:space-between; font-size: 11px;"><span id="perfXpTexto">XP: 0/50</span><span id="perfXpLimite">0/25 XP Diário</span></div>
                        <div class="xp-barra-fundo"><div class="xp-barra-progresso" id="perfBarraProgresso"></div></div>
                    </div>
                </div>

                <div class="input-add-grupo">
                    <button class="btn-acao" id="btnCriarSala" style="background:#ffaa00; display:none; width:100%;" onclick="criarSalaOnline()">🌐 Criar Sala Online (Líder)</button>
                </div>

                <div class="input-add-grupo">
                    <input type="text" id="nome-jogador" placeholder="Convidado Local...">
                    <button class="btn-acao" onclick="adicionarJogador()">+ Add</button>
                </div>
                <div class="lista-jogadores" id="listaJogadoresContainer"></div>
            </div>

            <div class="card">
                <div class="card-titulo" id="lblGestaoMissoes">🎯 Gestão de Missões & Slots</div>
                <div class="input-add-grupo">
                    <input type="text" id="texto-desafio" placeholder="Nova Missão...">
                    <select id="dificuldade-desafio" style="width: 100px;"><option value="Fácil">Fácil</option><option value="Médio">Médio</option><option value="Difícil">Difícil</option></select>
                    <button class="btn-acao" onclick="adicionarDesafio()">Add</button>
                </div>
                <div class="input-add-grupo"><select id="seletor-remover"></select><button class="btn-acao apagar" onclick="removerDesafio()">Apagar</button></div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalSazonalPopup">
        <div class="modal-card" style="text-align: center; max-width: 450px; padding: 30px; border: 2px solid var(--primaria);">
            <button class="modal-fechar" onclick="fecharSazonalPopup()">✕</button>
            <div style="font-size: 40px; margin-bottom: 15px;" id="popupSazonalEmoji">🔔</div>
            <p style="font-size: 18px; font-weight: bold; line-height: 1.6; color: #fff;" id="popupSazonalTexto"></p>
        </div>
    </div>

    <div class="modal-overlay" id="modalAuth">
        <div class="modal-card">
            <button class="modal-fechar" onclick="fecharModalAuth()">✕</button>
            <form id="formLogin" onsubmit="executarLogin(event)">
                <input type="text" id="loginUser" placeholder="Usuário ou E-mail" required><br><br>
                <input type="password" id="loginSenha" placeholder="Senha" required><br><br>
                <button type="submit" class="btn-acao" style="width: 100%;">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        const USAR_SERVIDOR_REAL = false; let db;
        let jogadoresLocais = [], jugadorAtualIndex = 0, estaGirando = false, anguloAtual = 0, usuarioLogado = null, salaOnlineCriada = false, cronometroInterval = null, desafioSorteadoGlobal = null;
        let eventoForcadoChave = "", idIntervalAnimacaoSazonal = null, subEventoJunhoForcado = "", idIntervalCoracoes = null;
        let desafios = [{ texto: "Equilibrar num pé só", dif: "Fácil" }, { texto: "Ficar estátua por 20s", dif: "Fácil" }, { texto: "Imitar um macaco", dif: "Médio" }, { texto: "Pagar 10 flexões", dif: "Difícil" }];
        let filtrosAtivos = { "Fácil": true, "Médio": true, "Difícil": true };
        const canvas = document.getElementById('roletaCanvas'), ctx = canvas.getContext('2d');

        const configuracoesSazonais = {
            set_1_30: { subtitulo: "7 de Setembro 🇧🇷", animarTituloBrasil: true, bandeiraCentral: true, fatia: "#0c7016", borda: "#ffff00", letras: "#FFFFFF", bg: "#233dff", emojis: [], botaoEmoji: "🇧🇷", acaoBotao: () => mostrarPopupSazonal("🇧🇷", "INDEDPENDÊNCIA OU MORTE?") },
            out_1_15: { subtitulo: "Dia das Crianças 🧸", tonsPasteis: true, fatia: "#ffb3ba", fatia2: "#baffc9", borda: "#bae1ff", letras: "#6d6d6d", bg: "#ffffba", emojis: ["🧸","🪅","💭","🪇","🏎️"], botaoEmoji: "🍭", acaoBotao: () => { tocarSomConfete(); } },
            out_16_31: { subtitulo: "Halloween 🎃", fatia: "#3e1964", borda: "#fc4c00", letras: "#FFFFFF", bg: "#000000", emojis: ["🎃","💀"], botaoEmoji: "🦇" },
            dez_1_31: { subtitulo: "Feliz Natal 🎄", animarTituloNatal: true, fatia: "#e90808", borda: "#d9d9d9", letras: "#FFFFFF", bg: "#00bf63", emojis: ["🦌","🛷","🎁"], botaoEmoji: "🎄", acaoBotao: () => mostrarPopupSazonal("✝️🛐", '"E o Verbo se fez carne e habitou entre nós, cheio de graça e de verdade, e vimos a sua glória, glória como do unigênito do Pai."<br><br>João 1.14 ✝️🛐') },
            jan_1_15: { subtitulo: "Feliz ano novo", fatia: "#fad430", borda: "#e18b22", letras: "#953f10", bg: "#FFFFFF", emojis: ["🍾", "🥂"], botaoEmoji: "✨" },
            jan_16_31: { subtitulo: "", fatia: "#fc0000", borda: "#f9e830", letras: "#000000", bg: "#7a0000", emojis: ["🏮", "🧧"], botaoEmoji: "🪭" },
            fev_1_15: { subtitulo: "", fatia: "#00167a", borda: "#70cbff", letras: "#FFFFFF", bg: "#FFFFFF", emojis: ["📖", "✏️"], botaoEmoji: "🎒" },
            mar_1_5: { subtitulo: "", letrasTituloEspeciais: true, fatia: "#ECE14A", borda: "#FB0106", letras: "#000000", bg: "#28E96C", emojis: ["🎉", "🪁"], botaoEmoji: "🥳" },
            mar_6_15: { subtitulo: "", tituloCor: "#FF1FA9", fatia: "#ff1fa9", borda: "#64007d", letras: "#000000", bg: "#f2caee", emojis: ["👩🏾‍🦱", "👩🏻‍🦳"], botaoEmoji: "👸🏼" },
            abr_1_30: { subtitulo: "", tituloCor: "#FFFFFF", fatia: "#ff7df2", borda: "#d9d9d9", letras: "#000000", bg: "#6492d8", emojis: ["🐰", "🪺"], botaoEmoji: "🕊️" },
            maio_1_20: { subtitulo: "Dia das Mães 🌹", fatia: "#9e3dff", borda: "#aa8bb1", letras: "#000000", bg: "#cd51ec", emojis: ["👩‍👦", "👩‍👧"], botaoEmoji: "🌹" },
            jun_orgulho: { subtitulo: "Mês do Orgulho 🏳️‍🌈", animarTituloLgbt: true, emojiCentralLgbt: true, fatia: "multi", borda: "#ffffff", letras: "#ffffff", bg: "linear-gradient(180deg, #1a0221, #021226)", emojis: ["❤️","🧡","💛","💚","💙","💜"], botaoEmoji: "🌈" },
            jun_namorados: { subtitulo: "Dia dos Namorados 🏹", fatia: "#ff2768", borda: "#f88f8f", letras: "#FFFFFF", bg: "#ffc2c7", emojis: ["#", "💍"], botaoEmoji: "🏹" },
            jun_saojoao: { subtitulo: "Festa de São João 🔥", fatia: "#fc4c00", borda: "#f7e135", letras: "#000000", bg: "#de0f3f", emojis: ["🫔", "🌽"], botaoEmoji: "🔥" },
            agosto_pais: { subtitulo: "Dia dos Pais 👔", fatia: "#00063d", borda: "#bdc3ff", letras: "#FFFFFF", bg: "#341bca", emojis: ["👨‍👦", "👨‍👧"], botaoEmoji: "👔" }
        };

        window.addEventListener('load', () => {
            let logadoSalvo = localStorage.getItem('roleta_logado');
            if(logadoSalvo) { usuarioLogado = JSON.parse(logadoSalvo); }
            atualizarInterfaceLogado(); verificarEExecutarEventosSazonais(); atualizarJogadores(); atualizarSeletores(); atualizarDisplayTempo();
        });

        function verificarEExecutarEventosSazonais() {
            clearInterval(idIntervalAnimacaoSazonal); clearInterval(idIntervalCoracoes);
            document.getElementById('containerEmojisSazonais').innerHTML = "";
            document.getElementById('emojiLgbtCentral').style.display = "none";
            document.getElementById('bandeiraBrasilCentral').style.display = "none";
            document.getElementById('contCoracoesCirculo').style.display = "none";
            document.getElementById('contCoracoesCirculo').innerHTML = "";
            
            let chaveEvento = "";
            if (eventoForcadoChave === "desativar") { chaveEvento = ""; }
            else if (eventoForcadoChave !== "") { chaveEvento = eventoForcadoChave; }
            else {
                let agora = new Date(), mes = agora.getMonth() + 1, dia = agora.getDate();
                if (mes === 9) chaveEvento = "set_1_30";
                else if (mes === 10 && dia >= 1 && dia <= 15) chaveEvento = "out_1_15";
                else if (mes === 10 && dia >= 16 && dia <= 31) chaveEvento = "out_16_31";
                else if (mes === 12) chaveEvento = "dez_1_31";
                else if (mes === 1 && dia >= 1 && dia <= 15) chaveEvento = "jan_1_15";
                else if (mes === 1 && dia >= 16 && dia <= 31) chaveEvento = "jan_16_31";
                else if (mes === 2 && dia >= 1 && dia <= 15) chaveEvento = "fev_1_15";
                else if (mes === 3 && dia >= 1 && dia <= 5) chaveEvento = "mar_1_5";
                else if (mes === 3 && dia >= 6 && dia <= 15) chaveEvento = "mar_6_15";
                else if (mes === 4 && dia >= 1 && dia <= 30) chaveEvento = "abr_1_30";
                else if (mes === 5 && dia >= 1 && dia <= 20) chaveEvento = "maio_1_20";
                else if (mes === 6) {
                    if (subEventoJunhoForcado !== "") chaveEvento = subEventoJunhoForcado;
                    else if (dia >= 1 && dia <= 15) chaveEvento = "jun_namorados";
                    else if (dia >= 16 && dia <= 30) chaveEvento = "jun_saojoao";
                    else chaveEvento = "jun_orgulho";
                }
                else if (mes === 8 && dia >= 1 && dia <= 15) chaveEvento = "agosto_pais";
            }

            const btnFlutuante = document.getElementById('btnSazonalFlutuante');
            const menuJunho = document.getElementById('menuJunhoCont');
            const txtSub = document.getElementById('txtSubtituloSazonal');
            const txtTitulo = document.getElementById('txtTituloRoleta');

            txtTitulo.className = "titulo-roleta"; txtTitulo.innerHTML = "ℛℴ𝓁ℯ𝓉𝒶";
            txtTitulo.style.background = ""; txtTitulo.style.webkitBackgroundClip = ""; txtTitulo.style.webkitTextFillColor = ""; txtTitulo.style.color = "";
            txtSub.innerText = ""; txtSub.style.color = ""; document.body.style.background = ""; document.body.style.color = "";
            btnFlutuante.style.display = "none"; menuJunho.style.display = "none";
            
            // Força a remoção de botões se não for administrador logado
            let isAdmin = usuarioLogado && usuarioLogado.id === "#1122264";
            
            if (chaveEvento !== "" && configuracoesSazonais[chaveEvento]) {
                let conf = configuracoesSazonais[chaveEvento];
                document.body.style.background = conf.bg;
                document.body.style.color = (conf.bg === "#FFFFFF" || conf.bg === "#ffffba") ? "#1a1d24" : "#f0f2f5";

                if(conf.subtitulo) txtSub.innerText = conf.subtitulo;

                if (conf.animarTituloLgbt) txtTitulo.className = "titulo-lgbt-movimento";
                else if (conf.animarTituloBrasil) txtTitulo.className = "titulo-brasil-movimento";
                else if (conf.animarTituloNatal) txtTitulo.className = "titulo-natal-movimento";
                else if (conf.tituloCor) txtTitulo.style.color = conf.tituloCor;
                else {
                    txtTitulo.style.background = "linear-gradient(135deg, #a855f7, #6366f1)";
                    txtTitulo.style.webkitBackgroundClip = "text"; txtTitulo.style.webkitTextFillColor = "transparent";
                }

                if (conf.emojiCentralLgbt) document.getElementById('emojiLgbtCentral').style.display = "block";
                if (conf.bandeiraCentral) {
                    document.getElementById('bandeiraBrasilCentral').style.display = "block";
                    inicializarCoracoesRadiais();
                }

                if (chaveEvento.startsWith("jun_")) {
                    menuJunho.style.display = "flex";
                } else if (conf.botaoEmoji) {
                    btnFlutuante.innerText = conf.botaoEmoji;
                    btnFlutuante.style.background = conf.fatia;
                    btnFlutuante.style.color = conf.letras;
                    btnFlutuante.style.borderColor = conf.borda;
                    btnFlutuante.style.display = "flex";
                }

                if(conf.emojis && conf.emojis.length > 0) inicializarChuvaEmojis(conf.emojis);
                window.sazonalAtivoDados = conf;
            } else {
                window.sazonalAtivoDados = null;
                txtTitulo.style.background = "linear-gradient(135deg, #a855f7, #6366f1)";
                txtTitulo.style.webkitBackgroundClip = "text"; txtTitulo.style.webkitTextFillColor = "transparent";
            }
            desenharRoleta();
        }

        function inicializarCoracoesRadiais() {
            const container = document.getElementById('contCoracoesCirculo');
            container.style.display = "block";
            const cores = ["💚", "💛", "💙"];
            idIntervalCoracoes = setInterval(() => {
                if(document.hidden) return;
                for(let i=0; i<3; i++) {
                    let coracao = document.createElement('div');
                    coracao.className = 'coracao-radial';
                    coracao.innerText = cores[Math.floor(Math.random() * cores.length)];
                    let angulo = Math.random() * Math.PI * 2;
                    let raio = 200 + Math.random() * 150;
                    coracao.style.setProperty('--x', `${Math.cos(angulo) * raio}px`);
                    coracao.style.setProperty('--y', `${Math.sin(angulo) * raio}px`);
                    container.appendChild(coracao);
                    setTimeout(() => coracao.remove(), 4000);
                }
            }, 600);
        }

        function inicializarChuvaEmojis(listaEmojis) {
            const container = document.getElementById('containerEmojisSazonais');
            idIntervalAnimacaoSazonal = setInterval(() => {
                if(document.hidden) return;
                let emojiEl = document.createElement('div');
                emojiEl.className = 'emoji-sazonal-bg';
                emojiEl.innerText = listaEmojis[Math.floor(Math.random() * listaEmojis.length)];
                emojiEl.style.left = (Math.random() * 100) + "vw";
                emojiEl.style.animationDuration = (Math.random() * 2 + 4) + "s";
                if(window.sazonalAtivoDados && window.sazonalAtivoDados.tonsPasteis) emojiEl.style.opacity = "0.75";
                container.appendChild(emojiEl);
                setTimeout(() => emojiEl.remove(), 6000);
            }, 500);
        }

        function tocarSomConfete() {
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator(), gain = context.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, context.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, context.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.4);
                osc.connect(gain); gain.connect(context.destination);
                osc.start(); osc.stop(context.currentTime + 0.4);
            } catch(e){}
            alert("🎉 BOOM! Explosão de Confetes Coloridos! 🍬🪅");
        }

        function mostrarPopupSazonal(emoji, texto) {
            document.getElementById('popupSazonalEmoji').innerHTML = emoji;
            document.getElementById('popupSazonalTexto').innerHTML = texto;
            document.getElementById('modalSazonalPopup').style.display = "flex";
        }
        function fecharSazonalPopup() { document.getElementById('modalSazonalPopup').style.display = "none"; }
        function ativarCliqueSazonal() { if(window.sazonalAtivoDados && window.sazonalAtivoDados.acaoBotao) window.sazonalAtivoDados.acaoBotao(); }
        function forcarEventoManual(valorChave) { subEventoJunhoForcado = ""; eventoForcadoChave = valorChave; verificarEExecutarEventosSazonais(); }
        function forcarSubEventoJunho(subChave) { subEventoJunhoForcado = subChave; eventoForcadoChave = subChave; verificarEExecutarEventosSazonais(); }

        function alternarModo() {
            if(window.sazonalAtivoDados) return; // Não afeta os eventos sazonais ativos
            let m = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', m === 'light' ? 'default' : 'light');
            desenharRoleta();
        }

        function atualizarInterfaceLogado() {
            let pAdmin = document.getElementById('painelTesteAdmin');
            if(usuarioLogado && usuarioLogado.id === "#1122264") {
                pAdmin.style.display = "flex";
            } else {
                pAdmin.style.display = "none";
                if(eventoForcadoChave !== "") { eventoForcadoChave = ""; verificarEExecutarEventosSazonais(); }
            }
            document.getElementById('btnAuthHeader').style.display = usuarioLogado ? 'none' : 'block';
            document.getElementById('btnLogoutHeader').style.display = usuarioLogado ? 'block' : 'none';
        }

        function ejecutarLogin(e) {
            e.preventDefault();
            let u = document.getElementById('loginUser').value.trim();
            if(u === "admin" || u === "#1122264") {
                usuarioLogado = { id: "#1122264", nome: "Avaliador Oficial", emoji: "🛠️", pontos: 0 };
            } else {
                usuarioLogado = { id: "#user_" + Math.floor(Math.random()*100), nome: u, emoji: "👤", pontos: 0 };
            }
            localStorage.setItem('roleta_logado', JSON.stringify(usuarioLogado));
            fecharModalAuth(); atualizarInterfaceLogado(); verificarEExecutarEventosSazonais(); atualizarJogadores();
        }

        function executarLogout() {
            usuarioLogado = null; localStorage.removeItem('roleta_logado');
            eventoForcadoChave = ""; subEventoJunhoForcado = "";
            atualizarInterfaceLogado(); verificarEExecutarEventosSazonais(); atualizarJogadores();
        }

        function abrirModalAuth() { document.getElementById('modalAuth').style.display = 'flex'; }
        function fecharModalAuth() { document.getElementById('modalAuth').style.display = 'none'; }

        function desenharRoleta() {
            let lista = desafios.filter(d => filtrosAtivos[d.dif]); ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(lista.length === 0) return;

            let tamAng = (2 * Math.PI) / lista.length;
            let c1 = "#1a1d2d", c2 = "#24293e", txtC = "#ffffff", bordaC = "rgba(255,255,255,0.1)";

            if (window.sazonalAtivoDados) {
                c1 = window.sazonalAtivoDados.fatia === "multi" ? "multi" : window.sazonalAtivoDados.fatia;
                c2 = window.sazonalAtivoDados.fatia2 ? window.sazonalAtivoDados.fatia2 : c1;
                txtC = window.sazonalAtivoDados.letras;
                bordaC = window.sazonalAtivoDados.borda;
            }

            const coresLgbt = ["#E40303", "#FF8C00", "#FFED00", "#008026", "#004CFF", "#732982"];

            lista.forEach((d, i) => {
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * tamAng, (i + 1) * tamAng);
                ctx.fillStyle = c1 === "multi" ? coresLgbt[i % 6] : (i % 2 === 0 ? c1 : c2);
                ctx.fill(); ctx.strokeStyle = bordaC; ctx.stroke();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * tamAng + tamAng/2);
                ctx.textAlign = "right"; ctx.fillStyle = txtC; ctx.font = "bold 13px sans-serif";
                ctx.fillText(d.texto.substring(0, 14), 210, 5); ctx.restore();
            });
        }

        function gridGirarEvent() {
            if(estaGirando) return; estaGirando = true;
            let voltas = 6 + Math.floor(Math.random() * 5); anguloAtual += (voltas * 360) + Math.floor(Math.random() * 360);
            canvas.style.transform = `rotate(${anguloAtual}deg)`;
            setTimeout(() => {
                estaGirando = false;
                let lista = desafios.filter(d => filtrosAtivos[d.dif]);
                let grFin = (360 - (anguloAtual % 360) + 270) % 360;
                let idx = Math.floor(grFin / (360 / lista.length)) % lista.length;
                desafioSorteadoGlobal = lista[idx];
                document.getElementById('desafioAtualTexto').innerText = `Missão: "${desafioSorteadoGlobal.texto}"`;
                document.getElementById('painelValidacao').style.display = 'flex';
            }, 3500);
        }

        function validarResultado(c) {
            document.getElementById('painelValidacao').style.display = 'none';
            document.getElementById('historico').innerText = c ? "Missão cumprida!" : "Não cumpriu.";
            let total = 1 + jogadoresLocais.length;
            jugadorAtualIndex = (jugadorAtualIndex + 1) % total; atualizarJogadores();
        }

        function adicionarJogador() {
            let inp = document.getElementById('nome-jogador'); if(!inp.value.trim()) return;
            jogadoresLocais.push({ nome: inp.value.trim(), pontos: 0 }); inp.value = ''; atualizarJogadores();
        }

        function atualizarJogadores() {
            let container = document.getElementById('listaJogadoresContainer'); container.innerHTML = '';
            let lista = []; if(usuarioLogado) lista.push({ nome: usuarioLogado.nome, pontos: usuarioLogado.pontos });
            jogadoresLocais.forEach(j => lista.push(j));
            lista.forEach((j, idx) => {
                let ativo = idx === jugadorAtualIndex ? 'style="border-color:var(--primaria); background:rgba(0,242,254,0.1);"' : '';
                container.innerHTML += `<div class="jogador-item" ${ativo}><div class="jogador-info"><span>${j.nome}</span><span><strong>${j.pontos} pts</strong></span></div></div>`;
            });
        }

        function adicionarDesafio() {
            let txt = document.getElementById('texto-desafio'); if(!txt.value.trim()) return;
            desafios.push({ texto: txt.value.trim(), dif: document.getElementById('dificuldade-desafio').value });
            txt.value = ''; atualizarSeletores(); desenharRoleta();
        }

        function atualizarSeletores() {
            let s = document.getElementById('seletor-remover'); if(!s) return; s.innerHTML = '';
            desafios.forEach((d, i) => s.innerHTML += `<option value="${i}">[${d.dif}] ${d.texto}</option>`);
        }

        function removerDesafio() {
            let s = document.getElementById('seletor-remover'); if(!s || s.value==="") return;
            desafios.splice(parseInt(s.value), 1); atualizarSeletores(); desenharRoleta();
        }

        function mudarFiltro(d) { filtrosAtivos[d] = !filtrosAtivos[d]; document.getElementById(`filtro-${d.toLowerCase()}`).classList.toggle('ativo', filtrosAtivos[d]); desenharRoleta(); }
        function atualizarDisplayTempo() { let t = parseInt(document.getElementById('tempoInput').value) || 30; document.getElementById('cronometro').innerText = `00:${t<10?'0'+t:t}`; }
        function toggleTemporizadorVisivel() {}
    </script>
